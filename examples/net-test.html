<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Net Test — HttpRequest / ImageLoader</title>
		<style>
			* {
				box-sizing: border-box;
			}
			body {
				margin: 0;
				background: #111;
				color: #ddd;
				font-family: monospace;
				font-size: 13px;
				display: flex;
				flex-direction: column;
				height: 100vh;
			}
			h1 {
				margin: 0;
				padding: 12px 16px;
				font-size: 15px;
				background: #1a1a2e;
				border-bottom: 1px solid #333;
				color: #8cf;
			}
			#main {
				display: flex;
				flex: 1;
				overflow: hidden;
			}
			#controls {
				width: 360px;
				flex-shrink: 0;
				padding: 12px;
				border-right: 1px solid #333;
				overflow-y: auto;
				display: flex;
				flex-direction: column;
				gap: 10px;
			}
			.card {
				background: #1c1c2e;
				border: 1px solid #333;
				border-radius: 6px;
				padding: 10px 12px;
			}
			.card h3 {
				margin: 0 0 8px 0;
				font-size: 12px;
				color: #8cf;
				text-transform: uppercase;
				letter-spacing: 0.05em;
			}
			.row {
				display: flex;
				align-items: center;
				gap: 8px;
				margin-bottom: 6px;
			}
			.row label {
				width: 100px;
				color: #aaa;
				flex-shrink: 0;
			}
			input[type='text'],
			select,
			textarea {
				flex: 1;
				background: #111;
				border: 1px solid #444;
				color: #eee;
				padding: 4px 6px;
				border-radius: 3px;
				font-family: monospace;
				font-size: 12px;
			}
			textarea {
				resize: vertical;
				min-height: 60px;
			}
			button {
				background: #2a2a4a;
				border: 1px solid #555;
				color: #ddd;
				padding: 5px 10px;
				border-radius: 4px;
				cursor: pointer;
				font-family: monospace;
				font-size: 12px;
			}
			button:hover {
				background: #3a3a6a;
				border-color: #8cf;
			}
			button.danger {
				border-color: #f44;
				color: #f88;
			}
			button.danger:hover {
				background: #3a1a1a;
			}
			.progress-bar {
				height: 6px;
				background: #222;
				border-radius: 3px;
				overflow: hidden;
				margin-top: 4px;
			}
			.progress-fill {
				height: 100%;
				background: #4af;
				width: 0%;
				transition: width 0.1s;
			}
			#image-preview {
				margin-top: 8px;
				max-width: 100%;
				max-height: 160px;
				border: 1px solid #333;
				border-radius: 4px;
				display: none;
			}
			/* log */
			#log-panel {
				flex: 1;
				display: flex;
				flex-direction: column;
				overflow: hidden;
			}
			#log-header {
				padding: 8px 12px;
				border-bottom: 1px solid #333;
				display: flex;
				align-items: center;
				gap: 10px;
				background: #161622;
			}
			#log-header span {
				color: #8cf;
				font-size: 12px;
				text-transform: uppercase;
				letter-spacing: 0.05em;
			}
			#log {
				flex: 1;
				overflow-y: auto;
				padding: 8px 12px;
				line-height: 1.6;
			}
			.log-entry {
				display: flex;
				gap: 10px;
				padding: 2px 0;
				border-bottom: 1px solid #1a1a1a;
			}
			.log-time {
				color: #555;
				flex-shrink: 0;
				width: 70px;
			}
			.log-tag {
				flex-shrink: 0;
				width: 80px;
				font-weight: bold;
			}
			.log-msg {
				color: #ccc;
				word-break: break-all;
			}
			.tag-event {
				color: #4af;
			}
			.tag-action {
				color: #fa4;
			}
			.tag-error {
				color: #f44;
			}
			.tag-info {
				color: #aaa;
			}
			/* response preview */
			#response-panel {
				width: 300px;
				flex-shrink: 0;
				border-left: 1px solid #333;
				display: flex;
				flex-direction: column;
				overflow: hidden;
			}
			#response-header {
				padding: 8px 12px;
				border-bottom: 1px solid #333;
				background: #161622;
				color: #8cf;
				font-size: 12px;
				text-transform: uppercase;
				letter-spacing: 0.05em;
			}
			#response-body {
				flex: 1;
				overflow-y: auto;
				padding: 8px 12px;
				white-space: pre-wrap;
				word-break: break-all;
				font-size: 11px;
				color: #8d8;
			}
		</style>
	</head>
	<body>
		<h1>Net Test — HttpRequest / ImageLoader</h1>
		<div id="main">
			<div id="controls">
				<!-- HttpRequest -->
				<div class="card">
					<h3>1. HttpRequest</h3>
					<div class="row">
						<label>URL</label>
						<input type="text" id="http-url" value="https://jsonplaceholder.typicode.com/todos/1" />
					</div>
					<div class="row">
						<label>Method</label>
						<select id="http-method">
							<option value="GET">GET</option>
							<option value="POST">POST</option>
						</select>
					</div>
					<div class="row">
						<label>Response Type</label>
						<select id="http-resp-type">
							<option value="text">text</option>
							<option value="arraybuffer">arraybuffer</option>
						</select>
					</div>
					<div class="row">
						<label>Timeout (ms)</label>
						<input type="text" id="http-timeout" value="0" style="width: 70px; flex: none" />
					</div>
					<div class="row">
						<label>Body (POST)</label>
						<textarea id="http-body">{"title":"foo","body":"bar","userId":1}</textarea>
					</div>
					<div class="row" style="gap: 6px">
						<button id="btn-http-send">Send</button>
						<button id="btn-http-abort" class="danger">Abort</button>
					</div>
					<div class="progress-bar"><div class="progress-fill" id="http-progress"></div></div>
				</div>

				<!-- ImageLoader -->
				<div class="card">
					<h3>2. ImageLoader</h3>
					<div class="row">
						<label>URL</label>
						<input type="text" id="img-url" value="https://picsum.photos/200/150" />
					</div>
					<div class="row">
						<label>crossOrigin</label>
						<select id="img-cors">
							<option value="">none</option>
							<option value="anonymous" selected>anonymous</option>
							<option value="use-credentials">use-credentials</option>
						</select>
					</div>
					<div class="row">
						<button id="btn-img-load">Load Image</button>
						<button id="btn-img-error" class="danger">Load 404</button>
					</div>
					<img id="image-preview" alt="loaded image" />
				</div>

				<!-- Quick tests -->
				<div class="card">
					<h3>3. Quick Tests</h3>
					<div class="row" style="flex-wrap: wrap; gap: 6px">
						<button id="btn-get-json">GET JSON</button>
						<button id="btn-get-text">GET Text</button>
						<button id="btn-post-json">POST JSON</button>
						<button id="btn-get-arraybuffer">GET ArrayBuffer</button>
						<button id="btn-timeout">Timeout (1s)</button>
						<button id="btn-404">404 Error</button>
					</div>
				</div>
			</div>

			<!-- Log -->
			<div id="log-panel">
				<div id="log-header">
					<span>Event Log</span>
					<button id="btn-clear-log" style="margin-left: auto">Clear</button>
				</div>
				<div id="log"></div>
			</div>

			<!-- Response preview -->
			<div id="response-panel">
				<div id="response-header">Response</div>
				<div id="response-body">—</div>
			</div>
		</div>

		<script type="module">
			import {
				HttpRequest,
				HttpMethod,
				HttpResponseType,
				ImageLoader,
				Event,
				IOErrorEvent,
				ProgressEvent,
			} from '../src/index.js';

			const logEl = document.getElementById('log');
			const t0 = Date.now();

			function log(tag, msg, cls = 'tag-info') {
				const elapsed = ((Date.now() - t0) / 1000).toFixed(2);
				const entry = document.createElement('div');
				entry.className = 'log-entry';
				entry.innerHTML =
					`<span class="log-time">${elapsed}s</span>` +
					`<span class="log-tag ${cls}">[${tag}]</span>` +
					`<span class="log-msg">${msg}</span>`;
				logEl.appendChild(entry);
				logEl.scrollTop = logEl.scrollHeight;
			}

			document.getElementById('btn-clear-log').onclick = () => (logEl.innerHTML = '');

			const responseBody = document.getElementById('response-body');
			const progressFill = document.getElementById('http-progress');

			// ── Active request ────────────────────────────────────────────────
			let activeReq;

			function sendRequest(url, method, responseType, body, timeout) {
				if (activeReq) activeReq.abort();

				const req = new HttpRequest();
				activeReq = req;
				req.responseType = responseType;
				req.timeout = timeout;

				req.addEventListener(Event.COMPLETE, () => {
					const r = req.response;
					if (r instanceof ArrayBuffer) {
						log('EVENT', `COMPLETE — ArrayBuffer ${r.byteLength} bytes`, 'tag-event');
						responseBody.textContent =
							`ArrayBuffer: ${r.byteLength} bytes\n\n` +
							Array.from(new Uint8Array(r).slice(0, 64))
								.map(b => b.toString(16).padStart(2, '0'))
								.join(' ') +
							(r.byteLength > 64 ? ' …' : '');
					} else {
						const preview = typeof r === 'string' ? r.slice(0, 2000) : String(r);
						log('EVENT', `COMPLETE — ${typeof r}, ${String(r).length} chars`, 'tag-event');
						try {
							responseBody.textContent = JSON.stringify(JSON.parse(preview), null, 2);
						} catch {
							responseBody.textContent = preview;
						}
					}
					progressFill.style.width = '100%';
					setTimeout(() => {
						progressFill.style.width = '0%';
					}, 800);
				});

				req.addEventListener(IOErrorEvent.IO_ERROR, () => {
					log('ERROR', `IO_ERROR — ${url}`, 'tag-error');
					responseBody.textContent = 'IO_ERROR';
					progressFill.style.width = '0%';
				});

				req.addEventListener(ProgressEvent.PROGRESS, e => {
					const pct = e.bytesTotal > 0 ? ((e.bytesLoaded / e.bytesTotal) * 100).toFixed(0) : '?';
					progressFill.style.width = (e.bytesTotal > 0 ? (e.bytesLoaded / e.bytesTotal) * 100 : 30) + '%';
					log('EVENT', `PROGRESS ${e.bytesLoaded}/${e.bytesTotal} (${pct}%)`, 'tag-event');
				});

				req.open(url, method);
				if (method === HttpMethod.POST && body) {
					req.setRequestHeader('Content-Type', 'application/json');
				}
				log(
					'ACTION',
					`${method} ${url} [${responseType}]${timeout ? ` timeout=${timeout}ms` : ''}`,
					'tag-action',
				);
				responseBody.textContent = 'loading…';
				req.send(method === HttpMethod.POST ? body : undefined);
			}

			// ── HttpRequest controls ──────────────────────────────────────────
			document.getElementById('btn-http-send').onclick = () => {
				sendRequest(
					document.getElementById('http-url').value.trim(),
					document.getElementById('http-method').value,
					document.getElementById('http-resp-type').value,
					document.getElementById('http-body').value,
					parseInt(document.getElementById('http-timeout').value) || 0,
				);
			};

			document.getElementById('btn-http-abort').onclick = () => {
				if (activeReq) {
					activeReq.abort();
					log('ACTION', 'abort()', 'tag-action');
					responseBody.textContent = 'aborted';
					progressFill.style.width = '0%';
				}
			};

			// ── Quick tests ───────────────────────────────────────────────────
			document.getElementById('btn-get-json').onclick = () =>
				sendRequest(
					'https://jsonplaceholder.typicode.com/posts/1',
					HttpMethod.GET,
					HttpResponseType.TEXT,
					null,
					0,
				);

			document.getElementById('btn-get-text').onclick = () =>
				sendRequest(
					'https://jsonplaceholder.typicode.com/todos/1',
					HttpMethod.GET,
					HttpResponseType.TEXT,
					null,
					0,
				);

			document.getElementById('btn-post-json').onclick = () =>
				sendRequest(
					'https://jsonplaceholder.typicode.com/posts',
					HttpMethod.POST,
					HttpResponseType.TEXT,
					'{"title":"test","body":"hello","userId":1}',
					0,
				);

			document.getElementById('btn-get-arraybuffer').onclick = () =>
				sendRequest('https://picsum.photos/50/50', HttpMethod.GET, HttpResponseType.ARRAY_BUFFER, null, 0);

			document.getElementById('btn-timeout').onclick = () =>
				sendRequest('https://httpbin.org/delay/5', HttpMethod.GET, HttpResponseType.TEXT, null, 1000);

			document.getElementById('btn-404').onclick = () =>
				sendRequest(
					'https://jsonplaceholder.typicode.com/nonexistent/999',
					HttpMethod.GET,
					HttpResponseType.TEXT,
					null,
					0,
				);

			// ── ImageLoader ───────────────────────────────────────────────────
			let imgLoader;
			const imgPreview = document.getElementById('image-preview');

			function loadImage(url) {
				imgLoader = new ImageLoader();
				imgLoader.crossOrigin = document.getElementById('img-cors').value || undefined;

				imgLoader.addEventListener(Event.COMPLETE, () => {
					const bd = imgLoader.data;
					log('EVENT', `ImageLoader COMPLETE — ${bd.width}×${bd.height}`, 'tag-event');
					// Show preview via canvas → data URL
					const c = document.createElement('canvas');
					c.width = bd.width;
					c.height = bd.height;
					c.getContext('2d').drawImage(bd.source, 0, 0);
					imgPreview.src = c.toDataURL();
					imgPreview.style.display = 'block';
				});

				imgLoader.addEventListener(IOErrorEvent.IO_ERROR, () => {
					log('ERROR', `ImageLoader IO_ERROR — ${url}`, 'tag-error');
					imgPreview.style.display = 'none';
				});

				log('ACTION', `ImageLoader.load("${url}")`, 'tag-action');
				imgLoader.load(url);
			}

			document.getElementById('btn-img-load').onclick = () =>
				loadImage(document.getElementById('img-url').value.trim());

			document.getElementById('btn-img-error').onclick = () =>
				loadImage('https://example.com/nonexistent-image-404.png');

			// ── Init ──────────────────────────────────────────────────────────
			log('INFO', 'Net test ready.', 'tag-info');
		</script>
	</body>
</html>
