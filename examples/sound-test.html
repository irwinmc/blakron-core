<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Sound / SoundChannel Test</title>
		<style>
			* {
				box-sizing: border-box;
			}
			body {
				margin: 0;
				background: #111;
				color: #ddd;
				font-family: monospace;
				font-size: 13px;
				display: flex;
				flex-direction: column;
				height: 100vh;
			}
			h1 {
				margin: 0;
				padding: 12px 16px;
				font-size: 15px;
				background: #1a1a2e;
				border-bottom: 1px solid #333;
				color: #8cf;
			}
			#main {
				display: flex;
				flex: 1;
				overflow: hidden;
			}
			/* ── Left panel: controls ── */
			#controls {
				width: 340px;
				flex-shrink: 0;
				padding: 12px;
				border-right: 1px solid #333;
				overflow-y: auto;
				display: flex;
				flex-direction: column;
				gap: 10px;
			}
			.card {
				background: #1c1c2e;
				border: 1px solid #333;
				border-radius: 6px;
				padding: 10px 12px;
			}
			.card h3 {
				margin: 0 0 8px 0;
				font-size: 12px;
				color: #8cf;
				text-transform: uppercase;
				letter-spacing: 0.05em;
			}
			.row {
				display: flex;
				align-items: center;
				gap: 8px;
				margin-bottom: 6px;
			}
			.row label {
				width: 90px;
				color: #aaa;
				flex-shrink: 0;
			}
			input[type='range'] {
				flex: 1;
			}
			input[type='text'],
			input[type='number'] {
				flex: 1;
				background: #111;
				border: 1px solid #444;
				color: #eee;
				padding: 3px 6px;
				border-radius: 3px;
				font-family: monospace;
				font-size: 12px;
			}
			button {
				background: #2a2a4a;
				border: 1px solid #555;
				color: #ddd;
				padding: 5px 10px;
				border-radius: 4px;
				cursor: pointer;
				font-family: monospace;
				font-size: 12px;
				white-space: nowrap;
			}
			button:hover {
				background: #3a3a6a;
				border-color: #8cf;
			}
			button:active {
				background: #4a4a8a;
			}
			button.danger {
				border-color: #f44;
				color: #f88;
			}
			button.danger:hover {
				background: #3a1a1a;
			}
			.status-badge {
				display: inline-block;
				padding: 2px 7px;
				border-radius: 10px;
				font-size: 11px;
				font-weight: bold;
			}
			.badge-idle {
				background: #333;
				color: #aaa;
			}
			.badge-loading {
				background: #553;
				color: #ff8;
			}
			.badge-ready {
				background: #253;
				color: #4f8;
			}
			.badge-playing {
				background: #235;
				color: #48f;
			}
			.badge-error {
				background: #522;
				color: #f88;
			}
			/* ── Right panel: log ── */
			#log-panel {
				flex: 1;
				display: flex;
				flex-direction: column;
				overflow: hidden;
			}
			#log-header {
				padding: 8px 12px;
				border-bottom: 1px solid #333;
				display: flex;
				align-items: center;
				gap: 10px;
				background: #161622;
			}
			#log-header span {
				color: #8cf;
				font-size: 12px;
				text-transform: uppercase;
				letter-spacing: 0.05em;
			}
			#log {
				flex: 1;
				overflow-y: auto;
				padding: 8px 12px;
				line-height: 1.6;
			}
			.log-entry {
				display: flex;
				gap: 10px;
				padding: 2px 0;
				border-bottom: 1px solid #1a1a1a;
			}
			.log-time {
				color: #555;
				flex-shrink: 0;
				width: 70px;
			}
			.log-tag {
				flex-shrink: 0;
				width: 80px;
				font-weight: bold;
			}
			.log-msg {
				color: #ccc;
			}
			.tag-event {
				color: #4af;
			}
			.tag-action {
				color: #fa4;
			}
			.tag-error {
				color: #f44;
			}
			.tag-info {
				color: #aaa;
			}
			/* ── Channel strip ── */
			.channel-strip {
				background: #161628;
				border: 1px solid #333;
				border-radius: 5px;
				padding: 8px 10px;
				display: flex;
				flex-direction: column;
				gap: 5px;
			}
			.channel-strip .ch-header {
				display: flex;
				align-items: center;
				gap: 8px;
				font-size: 12px;
				color: #aaa;
			}
			.ch-name {
				font-weight: bold;
				color: #ddd;
			}
			.ch-pos {
				color: #8cf;
				font-size: 11px;
				margin-left: auto;
			}
			.ch-controls {
				display: flex;
				gap: 6px;
				align-items: center;
			}
			.vol-label {
				color: #aaa;
				font-size: 11px;
			}
		</style>
	</head>
	<body>
		<h1>Sound / SoundChannel Test</h1>
		<div id="main">
			<!-- ── Controls ── -->
			<div id="controls">
				<!-- Load -->
				<div class="card">
					<h3>1. Load Sound</h3>
					<div class="row">
						<label>URL</label>
						<input
							type="text"
							id="url-input"
							value="https://cdn1.suno.ai/171aedd9-04c7-486e-ab8f-6d88aec139fc.mp3"
						/>
					</div>
					<div class="row">
						<label>Status</label>
						<span id="load-status" class="status-badge badge-idle">idle</span>
					</div>
					<div class="row">
						<label>Duration</label>
						<span id="duration">—</span>
					</div>
					<div class="row" style="gap: 6px">
						<button id="btn-load">Load</button>
						<button id="btn-close" class="danger">Close</button>
					</div>
				</div>

				<!-- Play -->
				<div class="card">
					<h3>2. Play</h3>
					<div class="row">
						<label>Start (s)</label>
						<input
							type="number"
							id="start-time"
							value="0"
							min="0"
							step="0.5"
							style="width: 70px; flex: none"
						/>
					</div>
					<div class="row">
						<label>Loops</label>
						<input type="number" id="loops" value="1" min="0" step="1" style="width: 70px; flex: none" />
						<span style="color: #666; font-size: 11px">(0 = infinite)</span>
					</div>
					<div class="row">
						<button id="btn-play">▶ Play</button>
						<button id="btn-play-inf">▶ Play ∞</button>
					</div>
				</div>

				<!-- Active channels -->
				<div class="card">
					<h3>3. Active Channels</h3>
					<div id="channels-list" style="display: flex; flex-direction: column; gap: 6px">
						<span style="color: #555; font-size: 11px">No active channels</span>
					</div>
				</div>

				<!-- Error test -->
				<div class="card">
					<h3>4. Error Cases</h3>
					<div class="row" style="flex-wrap: wrap; gap: 6px">
						<button id="btn-play-before-load">Play before load</button>
						<button id="btn-load-404">Load 404 URL</button>
						<button id="btn-load-bad">Load bad URL</button>
					</div>
				</div>

				<!-- Stress test -->
				<div class="card">
					<h3>5. Stress — Rapid Fire</h3>
					<div class="row">
						<label>Count</label>
						<input
							type="number"
							id="stress-count"
							value="5"
							min="1"
							max="20"
							style="width: 60px; flex: none"
						/>
					</div>
					<div class="row">
						<button id="btn-stress">Fire N channels</button>
						<button id="btn-stop-all" class="danger">Stop All</button>
					</div>
				</div>
			</div>

			<!-- ── Log ── -->
			<div id="log-panel">
				<div id="log-header">
					<span>Event Log</span>
					<button id="btn-clear-log" style="margin-left: auto">Clear</button>
				</div>
				<div id="log"></div>
			</div>
		</div>

		<script type="module">
			import { Sound, SoundChannel, Event, IOErrorEvent } from '../src/index.js';

			// ── Logging ──────────────────────────────────────────────────────────
			const logEl = document.getElementById('log');
			const t0 = Date.now();

			function log(tag, msg, cls = 'tag-info') {
				const elapsed = ((Date.now() - t0) / 1000).toFixed(2);
				const entry = document.createElement('div');
				entry.className = 'log-entry';
				entry.innerHTML =
					`<span class="log-time">${elapsed}s</span>` +
					`<span class="log-tag ${cls}">[${tag}]</span>` +
					`<span class="log-msg">${msg}</span>`;
				logEl.appendChild(entry);
				logEl.scrollTop = logEl.scrollHeight;
			}

			document.getElementById('btn-clear-log').onclick = () => (logEl.innerHTML = '');

			// ── State ────────────────────────────────────────────────────────────
			let sound = new Sound();
			let channelId = 0;
			const activeChannels = new Map(); // id → { channel, name, intervalId }

			// ── Status helpers ───────────────────────────────────────────────────
			const loadStatus = document.getElementById('load-status');
			const durationEl = document.getElementById('duration');

			function setStatus(state) {
				const map = {
					idle: ['idle', 'badge-idle'],
					loading: ['loading…', 'badge-loading'],
					ready: ['ready', 'badge-ready'],
					playing: ['playing', 'badge-playing'],
					error: ['error', 'badge-error'],
				};
				const [text, cls] = map[state] ?? ['?', 'badge-idle'];
				loadStatus.textContent = text;
				loadStatus.className = 'status-badge ' + cls;
			}

			function attachSoundListeners(snd, label = '') {
				snd.addEventListener(Event.COMPLETE, () => {
					log('EVENT', `${label} COMPLETE — duration: ${snd.length.toFixed(2)}s`, 'tag-event');
					durationEl.textContent = snd.length.toFixed(2) + 's';
					setStatus('ready');
				});
				snd.addEventListener(IOErrorEvent.IO_ERROR, () => {
					log('ERROR', `${label} IO_ERROR`, 'tag-error');
					setStatus('error');
				});
			}

			attachSoundListeners(sound, 'Sound');

			// ── Channel list UI ──────────────────────────────────────────────────
			const channelsList = document.getElementById('channels-list');

			function renderChannels() {
				channelsList.innerHTML = '';
				if (activeChannels.size === 0) {
					channelsList.innerHTML = '<span style="color:#555;font-size:11px">No active channels</span>';
					return;
				}
				for (const [id, entry] of activeChannels) {
					const strip = document.createElement('div');
					strip.className = 'channel-strip';
					strip.id = `ch-strip-${id}`;
					strip.innerHTML = `
						<div class="ch-header">
							<span class="ch-name">#${id} ${entry.name}</span>
							<span class="ch-pos" id="ch-pos-${id}">0.00s</span>
						</div>
						<div class="ch-controls">
							<span class="vol-label">Vol</span>
							<input type="range" min="0" max="1" step="0.01" value="${entry.channel.volume}"
								id="ch-vol-${id}" style="flex:1" />
							<button data-stop="${id}" class="danger" style="padding:3px 8px">■ Stop</button>
						</div>`;
					channelsList.appendChild(strip);

					document.getElementById(`ch-vol-${id}`).addEventListener('input', e => {
						entry.channel.volume = parseFloat(e.target.value);
						log('ACTION', `#${id} volume → ${entry.channel.volume.toFixed(2)}`, 'tag-action');
					});
				}

				channelsList.querySelectorAll('[data-stop]').forEach(btn => {
					btn.addEventListener('click', () => stopChannel(parseInt(btn.dataset.stop)));
				});
			}

			function stopChannel(id) {
				const entry = activeChannels.get(id);
				if (!entry) return;
				clearInterval(entry.intervalId);
				entry.channel.stop();
				activeChannels.delete(id);
				log('ACTION', `#${id} stopped`, 'tag-action');
				renderChannels();
			}

			function addChannel(channel, name) {
				const id = ++channelId;
				const intervalId = setInterval(() => {
					const posEl = document.getElementById(`ch-pos-${id}`);
					if (posEl) posEl.textContent = channel.position.toFixed(2) + 's';
				}, 100);

				channel.addEventListener(Event.SOUND_COMPLETE, () => {
					log('EVENT', `#${id} SOUND_COMPLETE`, 'tag-event');
					clearInterval(intervalId);
					activeChannels.delete(id);
					renderChannels();
				});

				activeChannels.set(id, { channel, name, intervalId });
				log('ACTION', `#${id} started — ${name}`, 'tag-action');
				renderChannels();
				return id;
			}

			// ── Load ─────────────────────────────────────────────────────────────
			document.getElementById('btn-load').onclick = () => {
				const url = document.getElementById('url-input').value.trim();
				if (!url) return;
				sound.close();
				sound = new Sound();
				attachSoundListeners(sound, 'Sound');
				setStatus('loading');
				durationEl.textContent = '—';
				log('ACTION', `load("${url}")`, 'tag-action');
				sound.load(url);
			};

			document.getElementById('btn-close').onclick = () => {
				sound.close();
				setStatus('idle');
				durationEl.textContent = '—';
				log('ACTION', 'sound.close()', 'tag-action');
			};

			// ── Play ─────────────────────────────────────────────────────────────
			document.getElementById('btn-play').onclick = () => {
				const startTime = parseFloat(document.getElementById('start-time').value) || 0;
				const loops = parseInt(document.getElementById('loops').value) || 1;
				log('ACTION', `play(startTime=${startTime}, loops=${loops})`, 'tag-action');
				const ch = sound.play(startTime, loops);
				addChannel(ch, `loops=${loops}`);
				setStatus('playing');
			};

			document.getElementById('btn-play-inf').onclick = () => {
				log('ACTION', 'play(0, 0) — infinite loop', 'tag-action');
				const ch = sound.play(0, 0);
				addChannel(ch, 'loops=∞');
				setStatus('playing');
			};

			// ── Error cases ──────────────────────────────────────────────────────
			document.getElementById('btn-play-before-load').onclick = () => {
				const fresh = new Sound();
				attachSoundListeners(fresh, 'FreshSound');
				log('ACTION', 'play() on unloaded Sound — expect IOErrorEvent', 'tag-action');
				const ch = fresh.play();
				addChannel(ch, 'no-op');
			};

			document.getElementById('btn-load-404').onclick = () => {
				const s = new Sound();
				attachSoundListeners(s, '404Sound');
				log('ACTION', 'load() with 404 URL', 'tag-action');
				s.load('https://example.com/nonexistent-audio-file-404.mp3');
			};

			document.getElementById('btn-load-bad').onclick = () => {
				const s = new Sound();
				attachSoundListeners(s, 'BadSound');
				log('ACTION', 'load() with bad URL (not audio)', 'tag-action');
				s.load('https://example.com/');
			};

			// ── Stress test ──────────────────────────────────────────────────────
			document.getElementById('btn-stress').onclick = () => {
				const n = parseInt(document.getElementById('stress-count').value) || 5;
				log('ACTION', `Firing ${n} channels simultaneously`, 'tag-action');
				for (let i = 0; i < n; i++) {
					const ch = sound.play(i * 0.1, 1);
					addChannel(ch, `stress-${i}`);
				}
			};

			document.getElementById('btn-stop-all').onclick = () => {
				log('ACTION', `Stopping all ${activeChannels.size} channels`, 'tag-action');
				for (const id of [...activeChannels.keys()]) stopChannel(id);
			};

			// ── Init log ─────────────────────────────────────────────────────────
			log('INFO', 'Sound test page ready. Load a sound to begin.', 'tag-info');
			log('INFO', 'AudioContext will be created on first play (browser policy).', 'tag-info');
		</script>
	</body>
</html>
