<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Video Test</title>
		<style>
			* {
				box-sizing: border-box;
			}
			body {
				margin: 0;
				background: #111;
				color: #ddd;
				font-family: monospace;
				font-size: 13px;
				display: flex;
				flex-direction: column;
				height: 100vh;
			}
			h1 {
				margin: 0;
				padding: 12px 16px;
				font-size: 15px;
				background: #1a1a2e;
				border-bottom: 1px solid #333;
				color: #8cf;
			}
			#main {
				display: flex;
				flex: 1;
				overflow: hidden;
			}
			#controls {
				width: 340px;
				flex-shrink: 0;
				padding: 12px;
				border-right: 1px solid #333;
				overflow-y: auto;
				display: flex;
				flex-direction: column;
				gap: 10px;
			}
			.card {
				background: #1c1c2e;
				border: 1px solid #333;
				border-radius: 6px;
				padding: 10px 12px;
			}
			.card h3 {
				margin: 0 0 8px 0;
				font-size: 12px;
				color: #8cf;
				text-transform: uppercase;
				letter-spacing: 0.05em;
			}
			.row {
				display: flex;
				align-items: center;
				gap: 8px;
				margin-bottom: 6px;
			}
			.row label {
				width: 90px;
				color: #aaa;
				flex-shrink: 0;
			}
			input[type='text'],
			input[type='number'],
			input[type='range'] {
				flex: 1;
				background: #111;
				border: 1px solid #444;
				color: #eee;
				padding: 4px 6px;
				border-radius: 3px;
				font-family: monospace;
				font-size: 12px;
			}
			input[type='range'] {
				padding: 0;
			}
			button {
				background: #2a2a4a;
				border: 1px solid #555;
				color: #ddd;
				padding: 5px 10px;
				border-radius: 4px;
				cursor: pointer;
				font-family: monospace;
				font-size: 12px;
				white-space: nowrap;
			}
			button:hover {
				background: #3a3a6a;
				border-color: #8cf;
			}
			button.danger {
				border-color: #f44;
				color: #f88;
			}
			button.danger:hover {
				background: #3a1a1a;
			}
			.status-badge {
				display: inline-block;
				padding: 2px 7px;
				border-radius: 10px;
				font-size: 11px;
				font-weight: bold;
			}
			.badge-idle {
				background: #333;
				color: #aaa;
			}
			.badge-loading {
				background: #553;
				color: #ff8;
			}
			.badge-ready {
				background: #253;
				color: #4f8;
			}
			.badge-playing {
				background: #235;
				color: #48f;
			}
			.badge-paused {
				background: #433;
				color: #fa8;
			}
			.badge-ended {
				background: #333;
				color: #888;
			}
			.badge-error {
				background: #522;
				color: #f88;
			}
			#canvas-area {
				flex: 1;
				display: flex;
				flex-direction: column;
				overflow: hidden;
			}
			#canvas-wrap {
				flex: 1;
				display: flex;
				align-items: center;
				justify-content: center;
				background: #000;
				overflow: hidden;
			}
			canvas {
				border: 1px solid #333;
			}
			#log-panel {
				height: 180px;
				border-top: 1px solid #333;
				display: flex;
				flex-direction: column;
				overflow: hidden;
			}
			#log-header {
				padding: 6px 12px;
				border-bottom: 1px solid #333;
				display: flex;
				align-items: center;
				gap: 10px;
				background: #161622;
				flex-shrink: 0;
			}
			#log-header span {
				color: #8cf;
				font-size: 12px;
				text-transform: uppercase;
				letter-spacing: 0.05em;
			}
			#log {
				flex: 1;
				overflow-y: auto;
				padding: 6px 12px;
				line-height: 1.6;
			}
			.log-entry {
				display: flex;
				gap: 10px;
				padding: 1px 0;
				border-bottom: 1px solid #1a1a1a;
			}
			.log-time {
				color: #555;
				flex-shrink: 0;
				width: 70px;
			}
			.log-tag {
				flex-shrink: 0;
				width: 80px;
				font-weight: bold;
			}
			.log-msg {
				color: #ccc;
			}
			.tag-event {
				color: #4af;
			}
			.tag-action {
				color: #fa4;
			}
			.tag-error {
				color: #f44;
			}
			.tag-info {
				color: #aaa;
			}
		</style>
	</head>
	<body>
		<h1>Video Test</h1>
		<div id="main">
			<div id="controls">
				<!-- Load -->
				<div class="card">
					<h3>1. Load</h3>
					<div class="row">
						<label>URL</label>
						<input type="text" id="video-url" value="https://www.w3schools.com/html/mov_bbb.mp4" />
					</div>
					<div class="row">
						<label>Poster URL</label>
						<input type="text" id="poster-url" value="" placeholder="optional" />
					</div>
					<div class="row">
						<label>Status</label>
						<span id="load-status" class="status-badge badge-idle">idle</span>
					</div>
					<div class="row">
						<label>Duration</label>
						<span id="duration">—</span>
					</div>
					<div class="row" style="gap: 6px">
						<button id="btn-load">Load</button>
						<button id="btn-close" class="danger">Close</button>
					</div>
				</div>

				<!-- Playback -->
				<div class="card">
					<h3>2. Playback</h3>
					<div class="row">
						<label>Start (s)</label>
						<input
							type="number"
							id="start-time"
							value="0"
							min="0"
							step="0.5"
							style="width: 70px; flex: none"
						/>
					</div>
					<div class="row">
						<label>Loop</label>
						<input type="checkbox" id="loop-check" />
					</div>
					<div class="row">
						<label>Fullscreen</label>
						<input type="checkbox" id="fullscreen-check" />
					</div>
					<div class="row" style="gap: 6px">
						<button id="btn-play">▶ Play</button>
						<button id="btn-pause">⏸ Pause</button>
					</div>
				</div>

				<!-- Seek & Volume -->
				<div class="card">
					<h3>3. Seek / Volume</h3>
					<div class="row">
						<label>Position</label>
						<span id="position-display" style="color: #8cf; font-size: 11px">0.00s</span>
					</div>
					<div class="row">
						<label>Seek (s)</label>
						<input type="number" id="seek-val" value="0" min="0" step="1" style="width: 70px; flex: none" />
						<button id="btn-seek">Go</button>
					</div>
					<div class="row">
						<label>Volume</label>
						<input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" />
						<span id="volume-display" style="color: #8cf; font-size: 11px; width: 30px">1.00</span>
					</div>
				</div>

				<!-- Display size -->
				<div class="card">
					<h3>4. Display Size</h3>
					<div class="row">
						<label>Width</label>
						<input
							type="number"
							id="disp-w"
							value="320"
							min="0"
							step="10"
							style="width: 70px; flex: none"
						/>
					</div>
					<div class="row">
						<label>Height</label>
						<input
							type="number"
							id="disp-h"
							value="240"
							min="0"
							step="10"
							style="width: 70px; flex: none"
						/>
					</div>
					<div class="row">
						<button id="btn-apply-size">Apply</button>
					</div>
				</div>
			</div>

			<!-- Canvas + Log -->
			<div id="canvas-area">
				<div id="canvas-wrap">
					<canvas id="gameCanvas" width="640" height="480"></canvas>
				</div>
				<div id="log-panel">
					<div id="log-header">
						<span>Event Log</span>
						<button id="btn-clear-log" style="margin-left: auto">Clear</button>
					</div>
					<div id="log"></div>
				</div>
			</div>
		</div>

		<script type="module">
			import {
				createPlayer,
				Sprite,
				Bitmap,
				Texture,
				BitmapData,
				Video,
				Event,
				IOErrorEvent,
			} from '../src/index.js';

			const logEl = document.getElementById('log');
			const t0 = Date.now();

			function log(tag, msg, cls = 'tag-info') {
				const elapsed = ((Date.now() - t0) / 1000).toFixed(2);
				const entry = document.createElement('div');
				entry.className = 'log-entry';
				entry.innerHTML =
					`<span class="log-time">${elapsed}s</span>` +
					`<span class="log-tag ${cls}">[${tag}]</span>` +
					`<span class="log-msg">${msg}</span>`;
				logEl.appendChild(entry);
				logEl.scrollTop = logEl.scrollHeight;
			}

			document.getElementById('btn-clear-log').onclick = () => (logEl.innerHTML = '');

			// ── Player setup ──────────────────────────────────────────────────
			const canvas = document.getElementById('gameCanvas');
			const app = createPlayer({
				canvas,
				contentWidth: 640,
				contentHeight: 480,
				scaleMode: 'showAll',
				frameRate: 30,
			});
			const root = new Sprite();
			app.start(root);

			// ── Video + Bitmap display ────────────────────────────────────────
			let video = new Video();
			let videoBitmap = new Bitmap();
			videoBitmap.x = 160;
			videoBitmap.y = 120;
			root.addChild(videoBitmap);

			// Update bitmap texture each frame from video bitmapData
			root.addEventListener(Event.ENTER_FRAME, () => {
				const bd = video.bitmapData;
				if (!bd) return;
				const tex = new Texture();
				tex.setBitmapData(bd);
				videoBitmap.texture = tex;
				document.getElementById('position-display').textContent = video.position.toFixed(2) + 's';
			});

			// ── Status helpers ────────────────────────────────────────────────
			const loadStatus = document.getElementById('load-status');
			const durationEl = document.getElementById('duration');

			function setStatus(state) {
				const map = {
					idle: ['idle', 'badge-idle'],
					loading: ['loading…', 'badge-loading'],
					ready: ['ready', 'badge-ready'],
					playing: ['playing', 'badge-playing'],
					paused: ['paused', 'badge-paused'],
					ended: ['ended', 'badge-ended'],
					error: ['error', 'badge-error'],
				};
				const [text, cls] = map[state] ?? ['?', 'badge-idle'];
				loadStatus.textContent = text;
				loadStatus.className = 'status-badge ' + cls;
			}

			function attachVideoListeners(v) {
				v.addEventListener(Event.COMPLETE, () => {
					log('EVENT', `COMPLETE — duration: ${v.length.toFixed(2)}s`, 'tag-event');
					durationEl.textContent = v.length.toFixed(2) + 's';
					setStatus('ready');
				});
				v.addEventListener(Event.ENDED, () => {
					log('EVENT', 'ENDED', 'tag-event');
					setStatus('ended');
				});
				v.addEventListener(IOErrorEvent.IO_ERROR, () => {
					log('ERROR', 'IO_ERROR', 'tag-error');
					setStatus('error');
				});
			}

			attachVideoListeners(video);

			// ── Load ──────────────────────────────────────────────────────────
			document.getElementById('btn-load').onclick = () => {
				const url = document.getElementById('video-url').value.trim();
				if (!url) return;
				video.close();
				video = new Video();
				attachVideoListeners(video);
				const poster = document.getElementById('poster-url').value.trim();
				if (poster) video.poster = poster;
				video.fullscreen = document.getElementById('fullscreen-check').checked;
				setStatus('loading');
				durationEl.textContent = '—';
				log('ACTION', `load("${url}")`, 'tag-action');
				video.load(url);
			};

			document.getElementById('btn-close').onclick = () => {
				video.close();
				videoBitmap.texture = undefined;
				setStatus('idle');
				durationEl.textContent = '—';
				log('ACTION', 'video.close()', 'tag-action');
			};

			// ── Playback ──────────────────────────────────────────────────────
			document.getElementById('btn-play').onclick = () => {
				const startTime = parseFloat(document.getElementById('start-time').value) || 0;
				const loop = document.getElementById('loop-check').checked;
				video.fullscreen = document.getElementById('fullscreen-check').checked;
				log('ACTION', `play(${startTime}, loop=${loop})`, 'tag-action');
				video.play(startTime, loop);
				setStatus('playing');
			};

			document.getElementById('btn-pause').onclick = () => {
				video.pause();
				log('ACTION', 'pause()', 'tag-action');
				setStatus('paused');
			};

			// ── Seek ──────────────────────────────────────────────────────────
			document.getElementById('btn-seek').onclick = () => {
				const t = parseFloat(document.getElementById('seek-val').value) || 0;
				video.position = t;
				log('ACTION', `position = ${t}`, 'tag-action');
			};

			// ── Volume ────────────────────────────────────────────────────────
			document.getElementById('volume-slider').addEventListener('input', e => {
				const v = parseFloat(e.target.value);
				video.volume = v;
				document.getElementById('volume-display').textContent = v.toFixed(2);
				log('ACTION', `volume = ${v.toFixed(2)}`, 'tag-action');
			});

			// ── Display size ──────────────────────────────────────────────────
			document.getElementById('btn-apply-size').onclick = () => {
				const w = parseInt(document.getElementById('disp-w').value) || 320;
				const h = parseInt(document.getElementById('disp-h').value) || 240;
				video.width = w;
				video.height = h;
				videoBitmap.width = w;
				videoBitmap.height = h;
				videoBitmap.x = (640 - w) / 2;
				videoBitmap.y = (480 - h) / 2;
				log('ACTION', `size = ${w}×${h}`, 'tag-action');
			};

			log('INFO', 'Video test ready. Load a video URL to begin.', 'tag-info');
			log('INFO', 'Note: fullscreen mode uses browser native fullscreen API.', 'tag-info');
		</script>
	</body>
</html>
