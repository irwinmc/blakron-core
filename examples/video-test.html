<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Video Test</title>
		<style>
			:root {
				--bg: #0a0b14;
				--bg-deep: #060710;
				--glass: rgba(255, 255, 255, 0.035);
				--glass-border: rgba(255, 255, 255, 0.07);
				--glass-hover: rgba(255, 255, 255, 0.06);
				--accent: #6c9cff;
				--success: #4ade80;
				--warning: #fbbf24;
				--error: #f87171;
				--text: #e0e0e8;
				--text-muted: #8888a0;
				--text-dim: #55556a;
				--sidebar-w: 300px;
				--log-h: 320px;
			}
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			body {
				background: var(--bg);
				color: var(--text);
				font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
				font-size: 12px;
				display: flex;
				flex-direction: column;
				height: 100vh;
				overflow: hidden;
			}
			body::before {
				content: '';
				position: fixed;
				inset: 0;
				background:
					radial-gradient(ellipse 600px 400px at 15% 80%, rgba(108, 156, 255, 0.06) 0%, transparent 70%),
					radial-gradient(ellipse 500px 500px at 85% 20%, rgba(167, 139, 250, 0.04) 0%, transparent 70%);
				pointer-events: none;
				z-index: 0;
			}
			.header {
				display: flex;
				align-items: center;
				gap: 16px;
				padding: 0 20px;
				height: 48px;
				border-bottom: 1px solid var(--glass-border);
				background: rgba(10, 11, 20, 0.85);
				backdrop-filter: blur(20px);
				flex-shrink: 0;
				position: relative;
				z-index: 10;
			}
			.back-link {
				display: flex;
				align-items: center;
				gap: 6px;
				color: var(--text-muted);
				text-decoration: none;
				font-size: 12px;
				padding: 4px 10px;
				border-radius: 6px;
				border: 1px solid transparent;
				transition: all 0.2s;
			}
			.back-link:hover {
				color: var(--accent);
				border-color: var(--glass-border);
				background: var(--glass);
			}
			.page-title {
				font-size: 13px;
				font-weight: 600;
				color: var(--text);
			}
			.header-right {
				margin-left: auto;
				display: flex;
				align-items: center;
				gap: 14px;
			}
			.fps-badge {
				font-size: 11px;
				font-weight: 600;
				padding: 3px 10px;
				border-radius: 6px;
				background: rgba(74, 222, 128, 0.1);
				border: 1px solid rgba(74, 222, 128, 0.2);
				color: var(--success);
				font-variant-numeric: tabular-nums;
				min-width: 68px;
				text-align: center;
				transition: all 0.3s;
			}
			.fps-badge.warn {
				background: rgba(251, 191, 36, 0.1);
				border-color: rgba(251, 191, 36, 0.2);
				color: var(--warning);
			}
			.fps-badge.bad {
				background: rgba(248, 113, 113, 0.1);
				border-color: rgba(248, 113, 113, 0.2);
				color: var(--error);
			}

			.main {
				display: flex;
				flex: 1;
				overflow: hidden;
				position: relative;
				z-index: 1;
			}
			.sidebar {
				width: var(--sidebar-w);
				flex-shrink: 0;
				border-right: 1px solid var(--glass-border);
				background: rgba(10, 11, 20, 0.5);
				backdrop-filter: blur(12px);
				overflow-y: auto;
				padding: 14px;
				display: flex;
				flex-direction: column;
				gap: 10px;
			}
			.sidebar::-webkit-scrollbar {
				width: 4px;
			}
			.sidebar::-webkit-scrollbar-track {
				background: transparent;
			}
			.sidebar::-webkit-scrollbar-thumb {
				background: rgba(255, 255, 255, 0.08);
				border-radius: 4px;
			}

			.glass-card {
				background: var(--glass);
				border: 1px solid var(--glass-border);
				border-radius: 10px;
				padding: 12px 14px;
				backdrop-filter: blur(12px);
			}
			.glass-card h3 {
				font-size: 10px;
				font-weight: 600;
				color: var(--text-muted);
				text-transform: uppercase;
				letter-spacing: 0.08em;
				margin-bottom: 10px;
			}
			.row {
				display: flex;
				align-items: center;
				gap: 8px;
				margin-bottom: 6px;
			}
			.row:last-child {
				margin-bottom: 0;
			}
			.row label {
				width: 80px;
				color: var(--text-muted);
				flex-shrink: 0;
				font-size: 11px;
			}
			input[type='range'] {
				flex: 1;
				min-width: 0;
				accent-color: var(--accent);
			}
			input[type='text'],
			input[type='number'] {
				flex: 1;
				min-width: 0;
				background: rgba(255, 255, 255, 0.04);
				border: 1px solid var(--glass-border);
				color: var(--text);
				padding: 4px 8px;
				border-radius: 6px;
				font-family: inherit;
				font-size: 11px;
				outline: none;
				transition: border-color 0.2s;
			}
			input[type='text']:focus,
			input[type='number']:focus {
				border-color: var(--accent);
			}

			button {
				background: rgba(108, 156, 255, 0.08);
				border: 1px solid rgba(108, 156, 255, 0.15);
				color: var(--text);
				padding: 5px 12px;
				border-radius: 7px;
				cursor: pointer;
				font-family: inherit;
				font-size: 11px;
				white-space: nowrap;
				transition: all 0.2s;
			}
			button:hover {
				background: rgba(108, 156, 255, 0.15);
				border-color: rgba(108, 156, 255, 0.3);
			}
			button.danger {
				border-color: rgba(248, 113, 113, 0.25);
				color: rgba(248, 113, 113, 0.9);
			}
			button.danger:hover {
				background: rgba(248, 113, 113, 0.12);
			}

			.status-badge {
				display: inline-block;
				padding: 2px 8px;
				border-radius: 6px;
				font-size: 10px;
				font-weight: 600;
			}
			.badge-idle {
				background: rgba(255, 255, 255, 0.05);
				color: var(--text-dim);
			}
			.badge-loading {
				background: rgba(251, 191, 36, 0.1);
				color: var(--warning);
			}
			.badge-ready {
				background: rgba(74, 222, 128, 0.1);
				color: var(--success);
			}
			.badge-playing {
				background: rgba(108, 156, 255, 0.1);
				color: var(--accent);
			}
			.badge-paused {
				background: rgba(251, 191, 36, 0.08);
				color: rgba(251, 191, 36, 0.8);
			}
			.badge-ended {
				background: rgba(255, 255, 255, 0.04);
				color: var(--text-dim);
			}
			.badge-error {
				background: rgba(248, 113, 113, 0.1);
				color: var(--error);
			}

			.right-panel {
				flex: 1;
				display: flex;
				flex-direction: column;
				overflow: hidden;
			}
			#canvas-wrap {
				flex: 1;
				display: flex;
				align-items: center;
				justify-content: center;
				background: var(--bg-deep);
				position: relative;
				overflow: hidden;
			}
			#canvas-wrap::before {
				content: '';
				position: absolute;
				inset: 0;
				background: radial-gradient(circle at 50% 50%, rgba(108, 156, 255, 0.03) 0%, transparent 60%);
				pointer-events: none;
			}
			canvas {
				border: 1px solid var(--glass-border);
				border-radius: 4px;
			}

			.log-panel {
				height: var(--log-h);
				border-top: 1px solid var(--glass-border);
				display: flex;
				flex-direction: column;
				overflow: hidden;
				background: rgba(6, 7, 16, 0.6);
				backdrop-filter: blur(12px);
			}
			.log-header {
				padding: 6px 14px;
				border-bottom: 1px solid var(--glass-border);
				display: flex;
				align-items: center;
				gap: 10px;
				flex-shrink: 0;
			}
			.log-header span {
				font-size: 10px;
				font-weight: 600;
				color: var(--text-muted);
				text-transform: uppercase;
				letter-spacing: 0.08em;
			}
			#log {
				flex: 1;
				overflow-y: auto;
				padding: 6px 14px;
				line-height: 1.7;
				font-size: 11px;
			}
			#log::-webkit-scrollbar {
				width: 4px;
			}
			#log::-webkit-scrollbar-track {
				background: transparent;
			}
			#log::-webkit-scrollbar-thumb {
				background: rgba(255, 255, 255, 0.06);
				border-radius: 4px;
			}
			.log-entry {
				display: flex;
				gap: 10px;
				padding: 1px 0;
				border-bottom: 1px solid rgba(255, 255, 255, 0.02);
			}
			.log-time {
				color: var(--text-dim);
				flex-shrink: 0;
				width: 60px;
				font-variant-numeric: tabular-nums;
			}
			.log-tag {
				flex-shrink: 0;
				width: 72px;
				font-weight: 600;
			}
			.log-msg {
				color: var(--text-muted);
			}
			.tag-event {
				color: #4ade80;
			}
			.tag-action {
				color: #fbbf24;
			}
			.tag-error {
				color: #f87171;
			}
			.tag-info {
				color: var(--text-dim);
			}
		</style>
	</head>
	<body>
		<div class="header">
			<a href="index.html" class="back-link">&larr; Back</a>
			<span class="page-title">Video Test</span>
			<div class="header-right">
				<div id="fps-display" class="fps-badge">-- FPS</div>
			</div>
		</div>
		<div class="main">
			<div class="sidebar">
				<!-- Load -->
				<div class="glass-card">
					<h3>1. Load</h3>
					<div class="row">
						<label>URL</label>
						<input type="text" id="video-url" value="https://www.w3schools.com/html/mov_bbb.mp4" />
					</div>
					<div class="row">
						<label>Poster</label>
						<input type="text" id="poster-url" value="" placeholder="optional" />
					</div>
					<div class="row">
						<label>Status</label>
						<span id="load-status" class="status-badge badge-idle">idle</span>
					</div>
					<div class="row">
						<label>Duration</label>
						<span id="duration">&mdash;</span>
					</div>
					<div class="row" style="gap: 6px">
						<button id="btn-load">Load</button>
						<button id="btn-close" class="danger">Close</button>
					</div>
				</div>

				<!-- Playback -->
				<div class="glass-card">
					<h3>2. Playback</h3>
					<div class="row">
						<label>Start (s)</label>
						<input
							type="number"
							id="start-time"
							value="0"
							min="0"
							step="0.5"
							style="width: 70px; flex: none"
						/>
					</div>
					<div class="row">
						<label>Loop</label>
						<input type="checkbox" id="loop-check" />
					</div>
					<div class="row">
						<label>Fullscreen</label>
						<input type="checkbox" id="fullscreen-check" />
					</div>
					<div class="row" style="gap: 6px">
						<button id="btn-play">&#9654; Play</button>
						<button id="btn-pause">&#9208; Pause</button>
					</div>
				</div>

				<!-- Seek & Volume -->
				<div class="glass-card">
					<h3>3. Seek / Volume</h3>
					<div class="row">
						<label>Position</label>
						<span
							id="position-display"
							style="color: var(--accent); font-size: 11px; font-variant-numeric: tabular-nums"
						>
							0.00s
						</span>
					</div>
					<div class="row">
						<label>Seek (s)</label>
						<input type="number" id="seek-val" value="0" min="0" step="1" style="width: 70px; flex: none" />
						<button id="btn-seek">Go</button>
					</div>
					<div class="row">
						<label>Volume</label>
						<input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" />
						<span
							id="volume-display"
							style="
								color: var(--accent);
								font-size: 11px;
								width: 30px;
								flex-shrink: 0;
								font-variant-numeric: tabular-nums;
							"
						>
							1.00
						</span>
					</div>
				</div>

				<!-- Display size -->
				<div class="glass-card">
					<h3>4. Display Size</h3>
					<div class="row">
						<label>Width</label>
						<input
							type="number"
							id="disp-w"
							value="320"
							min="0"
							step="10"
							style="width: 70px; flex: none"
						/>
					</div>
					<div class="row">
						<label>Height</label>
						<input
							type="number"
							id="disp-h"
							value="240"
							min="0"
							step="10"
							style="width: 70px; flex: none"
						/>
					</div>
					<div class="row">
						<button id="btn-apply-size">Apply</button>
					</div>
				</div>
			</div>

			<div class="right-panel">
				<div id="canvas-wrap">
					<canvas id="gameCanvas" width="640" height="480"></canvas>
				</div>
				<div class="log-panel">
					<div class="log-header">
						<span>Event Log</span>
						<button id="btn-clear-log" style="margin-left: auto; padding: 3px 8px; font-size: 10px">
							Clear
						</button>
					</div>
					<div id="log"></div>
				</div>
			</div>
		</div>

		<script type="module">
			import {
				createPlayer,
				Sprite,
				Bitmap,
				Texture,
				BitmapData,
				Video,
				Event,
				IOErrorEvent,
			} from '../src/index.js';

			// ── FPS Counter ────────────────────────────────────────────────────
			const fpsEl = document.getElementById('fps-display');
			let fpsFrames = 0,
				fpsLast = performance.now();
			(function fpsLoop() {
				fpsFrames++;
				const now = performance.now();
				if (now - fpsLast >= 500) {
					const fps = Math.round((fpsFrames / (now - fpsLast)) * 1000);
					fpsEl.textContent = fps + ' FPS';
					fpsEl.className = 'fps-badge' + (fps > 50 ? '' : fps > 30 ? ' warn' : ' bad');
					fpsFrames = 0;
					fpsLast = now;
				}
				requestAnimationFrame(fpsLoop);
			})();

			const logEl = document.getElementById('log');
			const t0 = Date.now();

			function log(tag, msg, cls = 'tag-info') {
				const elapsed = ((Date.now() - t0) / 1000).toFixed(2);
				const entry = document.createElement('div');
				entry.className = 'log-entry';
				entry.innerHTML =
					`<span class="log-time">${elapsed}s</span>` +
					`<span class="log-tag ${cls}">[${tag}]</span>` +
					`<span class="log-msg">${msg}</span>`;
				logEl.appendChild(entry);
				logEl.scrollTop = logEl.scrollHeight;
			}

			document.getElementById('btn-clear-log').onclick = () => (logEl.innerHTML = '');

			// ── Player setup ──────────────────────────────────────────────────
			const canvas = document.getElementById('gameCanvas');
			const app = createPlayer({
				canvas,
				contentWidth: 640,
				contentHeight: 480,
				scaleMode: 'showAll',
				frameRate: 30,
			});
			const root = new Sprite();
			app.start(root);

			// ── Video + Bitmap display ────────────────────────────────────────
			let video = new Video();
			let videoBitmap = new Bitmap();
			videoBitmap.x = 160;
			videoBitmap.y = 120;
			root.addChild(videoBitmap);

			// Update bitmap texture each frame from video bitmapData
			root.addEventListener(Event.ENTER_FRAME, () => {
				const bd = video.bitmapData;
				if (!bd) return;
				const tex = new Texture();
				tex.setBitmapData(bd);
				videoBitmap.texture = tex;
				document.getElementById('position-display').textContent = video.position.toFixed(2) + 's';
			});

			// ── Status helpers ────────────────────────────────────────────────
			const loadStatus = document.getElementById('load-status');
			const durationEl = document.getElementById('duration');

			function setStatus(state) {
				const map = {
					idle: ['idle', 'badge-idle'],
					loading: ['loading…', 'badge-loading'],
					ready: ['ready', 'badge-ready'],
					playing: ['playing', 'badge-playing'],
					paused: ['paused', 'badge-paused'],
					ended: ['ended', 'badge-ended'],
					error: ['error', 'badge-error'],
				};
				const [text, cls] = map[state] ?? ['?', 'badge-idle'];
				loadStatus.textContent = text;
				loadStatus.className = 'status-badge ' + cls;
			}

			function attachVideoListeners(v) {
				v.addEventListener(Event.COMPLETE, () => {
					log('EVENT', `COMPLETE — duration: ${v.length.toFixed(2)}s`, 'tag-event');
					durationEl.textContent = v.length.toFixed(2) + 's';
					setStatus('ready');
				});
				v.addEventListener(Event.ENDED, () => {
					log('EVENT', 'ENDED', 'tag-event');
					setStatus('ended');
				});
				v.addEventListener(IOErrorEvent.IO_ERROR, () => {
					log('ERROR', 'IO_ERROR', 'tag-error');
					setStatus('error');
				});
			}

			attachVideoListeners(video);

			// ── Load ──────────────────────────────────────────────────────────
			document.getElementById('btn-load').onclick = () => {
				const url = document.getElementById('video-url').value.trim();
				if (!url) return;
				video.close();
				video = new Video();
				attachVideoListeners(video);
				const poster = document.getElementById('poster-url').value.trim();
				if (poster) video.poster = poster;
				video.fullscreen = document.getElementById('fullscreen-check').checked;
				setStatus('loading');
				durationEl.textContent = '—';
				log('ACTION', `load("${url}")`, 'tag-action');
				video.load(url);
			};

			document.getElementById('btn-close').onclick = () => {
				video.close();
				videoBitmap.texture = undefined;
				setStatus('idle');
				durationEl.textContent = '—';
				log('ACTION', 'video.close()', 'tag-action');
			};

			// ── Playback ──────────────────────────────────────────────────────
			document.getElementById('btn-play').onclick = () => {
				const startTime = parseFloat(document.getElementById('start-time').value) || 0;
				const loop = document.getElementById('loop-check').checked;
				video.fullscreen = document.getElementById('fullscreen-check').checked;
				log('ACTION', `play(${startTime}, loop=${loop})`, 'tag-action');
				video.play(startTime, loop);
				setStatus('playing');
			};

			document.getElementById('btn-pause').onclick = () => {
				video.pause();
				log('ACTION', 'pause()', 'tag-action');
				setStatus('paused');
			};

			// ── Seek ──────────────────────────────────────────────────────────
			document.getElementById('btn-seek').onclick = () => {
				const t = parseFloat(document.getElementById('seek-val').value) || 0;
				video.position = t;
				log('ACTION', `position = ${t}`, 'tag-action');
			};

			// ── Volume ────────────────────────────────────────────────────────
			document.getElementById('volume-slider').addEventListener('input', e => {
				const v = parseFloat(e.target.value);
				video.volume = v;
				document.getElementById('volume-display').textContent = v.toFixed(2);
				log('ACTION', `volume = ${v.toFixed(2)}`, 'tag-action');
			});

			// ── Display size ──────────────────────────────────────────────────
			document.getElementById('btn-apply-size').onclick = () => {
				const w = parseInt(document.getElementById('disp-w').value) || 320;
				const h = parseInt(document.getElementById('disp-h').value) || 240;
				video.width = w;
				video.height = h;
				videoBitmap.width = w;
				videoBitmap.height = h;
				videoBitmap.x = (640 - w) / 2;
				videoBitmap.y = (480 - h) / 2;
				log('ACTION', `size = ${w}x${h}`, 'tag-action');
			};

			log('INFO', 'Video test ready. Load a video URL to begin.', 'tag-info');
			log('INFO', 'Note: fullscreen mode uses browser native fullscreen API.', 'tag-info');
		</script>
	</body>
</html>
