<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Benchmark — Heron Engine</title>
		<style>
			:root {
				--bg: #0a0b14;
				--bg-deep: #060710;
				--glass: rgba(255, 255, 255, 0.035);
				--glass-border: rgba(255, 255, 255, 0.07);
				--glass-hover: rgba(255, 255, 255, 0.06);
				--accent: #6c9cff;
				--success: #4ade80;
				--warning: #fbbf24;
				--error: #f87171;
				--text: #e0e0e8;
				--text-muted: #8888a0;
				--text-dim: #55556a;
				--sidebar-w: 300px;
			}
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			body {
				background: var(--bg);
				color: var(--text);
				font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
				font-size: 12px;
				display: flex;
				flex-direction: column;
				height: 100vh;
				overflow: hidden;
			}
			body::before {
				content: '';
				position: fixed;
				inset: 0;
				background:
					radial-gradient(ellipse 600px 400px at 15% 80%, rgba(108, 156, 255, 0.06) 0%, transparent 70%),
					radial-gradient(ellipse 500px 500px at 85% 20%, rgba(167, 139, 250, 0.04) 0%, transparent 70%);
				pointer-events: none;
				z-index: 0;
			}
			.header {
				display: flex;
				align-items: center;
				gap: 16px;
				padding: 0 20px;
				height: 48px;
				border-bottom: 1px solid var(--glass-border);
				background: rgba(10, 11, 20, 0.85);
				backdrop-filter: blur(20px);
				flex-shrink: 0;
				position: relative;
				z-index: 10;
			}
			.back-link {
				display: flex;
				align-items: center;
				gap: 6px;
				color: var(--text-muted);
				text-decoration: none;
				font-size: 12px;
				padding: 4px 10px;
				border-radius: 6px;

				transition: all 0.2s;
			}
			.back-link:hover {
				color: var(--accent);
				border-color: var(--glass-border);
				background: var(--glass);
			}
			.page-title {
				font-size: 13px;
				font-weight: 600;
				color: var(--text);
			}

			.main {
				display: flex;
				flex: 1;
				overflow: hidden;
				position: relative;
				z-index: 1;
			}

			.sidebar {
				width: var(--sidebar-w);
				flex-shrink: 0;
				border-right: 1px solid var(--glass-border);
				background: rgba(10, 11, 20, 0.5);
				backdrop-filter: blur(12px);
				overflow-y: auto;
				padding: 14px;
				display: flex;
				flex-direction: column;
				gap: 10px;
			}
			.sidebar::-webkit-scrollbar {
				width: 4px;
			}
			.sidebar::-webkit-scrollbar-track {
				background: transparent;
			}
			.sidebar::-webkit-scrollbar-thumb {
				background: rgba(255, 255, 255, 0.08);
				border-radius: 4px;
			}

			.glass-card {
				background: var(--glass);
				border: 1px solid var(--glass-border);
				border-radius: 10px;
				padding: 12px 14px;
				backdrop-filter: blur(12px);
			}
			.glass-card h3 {
				font-size: 10px;
				font-weight: 600;
				color: var(--text-muted);
				text-transform: uppercase;
				letter-spacing: 0.08em;
				margin-bottom: 10px;
			}

			.scene-radio-group {
				display: flex;
				flex-direction: column;
				gap: 5px;
			}
			.scene-radio-group label {
				display: flex;
				align-items: center;
				gap: 7px;
				font-size: 11px;
				cursor: pointer;
				padding: 3px 5px;
				border-radius: 4px;
				transition: background 0.15s;
			}
			.scene-radio-group label:hover {
				background: var(--glass-hover);
			}
			.scene-radio-group input[type='radio'] {
				accent-color: var(--accent);
			}

			.slider-row {
				display: flex;
				flex-direction: column;
				gap: 5px;
				font-size: 11px;
			}
			.slider-row .slider-label {
				display: flex;
				justify-content: space-between;
				color: var(--text-muted);
			}
			.slider-row input[type='range'] {
				width: 100%;
				accent-color: var(--accent);
			}

			.metric-row {
				display: flex;
				justify-content: space-between;
				align-items: center;
				font-size: 11px;
				line-height: 1.8;
			}
			.metric-row .label {
				color: var(--text-dim);
			}
			.metric-row .value {
				font-weight: 600;
				font-variant-numeric: tabular-nums;
			}
			.metric-row .value.good {
				color: var(--success);
			}
			.metric-row .value.warn {
				color: var(--warning);
			}
			.metric-row .value.bad {
				color: var(--error);
			}
			.metric-row .value.dimmed {
				color: var(--text-dim);

				display: inline-block;
				font-size: 10px;
				padding: 2px 8px;
				border-radius: 6px;
				font-weight: 600;
			}
			#status-badge.warmup {
				background: rgba(251, 191, 36, 0.1);
				color: var(--warning);
			}
			#status-badge.measuring {
				background: rgba(74, 222, 128, 0.1);
				color: var(--success);
			}
			#status-badge.paused {
				background: rgba(248, 113, 113, 0.1);
				color: var(--error);
			}

			#fps-graph {
				border: none;
				margin: 6px 0 0 0;
				width: 100%;
				height: 60px;
				display: block;
			}

			.btn-row {
				display: flex;
				gap: 6px;
				flex-wrap: wrap;
			}
			button {
				background: rgba(108, 156, 255, 0.08);
				border: 1px solid rgba(108, 156, 255, 0.15);
				color: var(--text);
				padding: 5px 12px;
				border-radius: 7px;
				cursor: pointer;
				font-family: inherit;
				font-size: 11px;
				white-space: nowrap;
				transition: all 0.2s;
			}
			button:hover {
				background: rgba(108, 156, 255, 0.15);
				border-color: rgba(108, 156, 255, 0.3);
			}
			button:active {
				background: rgba(108, 156, 255, 0.2);
			}

			#toast {
				position: fixed;
				bottom: 20px;
				left: 50%;
				transform: translateX(-50%);
				background: rgba(6, 7, 16, 0.85);
				border: 1px solid var(--glass-border);
				border-radius: 8px;
				padding: 8px 18px;
				backdrop-filter: blur(12px);
				font-size: 12px;
				color: var(--text);
				pointer-events: none;
				opacity: 0;
				transition: opacity 0.3s;
				z-index: 9999;
			}
			#toast.show {
				opacity: 1;
			}

			#fallback-textarea-wrap {
				display: none;
				position: fixed;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				background: var(--bg);
				border: 1px solid var(--glass-border);
				border-radius: 10px;
				padding: 16px;
				backdrop-filter: blur(12px);
				z-index: 9999;
				width: 500px;
			}
			#fallback-textarea-wrap h5 {
				margin: 0 0 8px 0;
				color: var(--accent);
				font-size: 12px;
			}
			#fallback-textarea-wrap textarea {
				width: 100%;
				height: 120px;
				background: rgba(255, 255, 255, 0.04);
				border: 1px solid var(--glass-border);
				color: var(--text);
				font-family: inherit;
				font-size: 11px;
				padding: 6px;
				resize: vertical;
			}
			#fallback-textarea-wrap button {
				margin-top: 8px;
			}

			.right-panel {
				flex: 1;
				display: flex;
				flex-direction: column;
				overflow: hidden;
			}
			#canvas-wrap {
				flex: 1;
				display: flex;
				align-items: center;
				justify-content: center;
				background: var(--bg-deep);
				position: relative;
				overflow: hidden;
			}
			#canvas-wrap::before {
				content: '';
				position: absolute;
				inset: 0;
				background: radial-gradient(circle at 50% 50%, rgba(108, 156, 255, 0.03) 0%, transparent 60%);
				pointer-events: none;
			}
			canvas {
				border: 1px solid var(--glass-border);
				border-radius: 4px;
			}
			#webgl-error {
				display: none;
				position: absolute;
				inset: 0;
				background: var(--bg-deep);
				color: var(--error);
				font-size: 14px;
				align-items: center;
				justify-content: center;
				text-align: center;
				padding: 20px;
			}
		</style>

		<script type="module">
			import {
				createPlayer,
				Sprite,
				Bitmap,
				BitmapData,
				Texture,
				Shape,
				BlurFilter,
				GlowFilter,
				Event,
			} from '../src/index.js';

			// ── MetricsCollector ──────────────────────────────────────────────────
			function percentile(sortedArr, p) {
				if (sortedArr.length === 0) return 0;
				const idx = Math.ceil(p * sortedArr.length) - 1;
				return sortedArr[Math.max(0, Math.min(idx, sortedArr.length - 1))];
			}

			class MetricsCollector {
				constructor(windowSize = 300) {
					this.windowSize = windowSize;
					this.buffer = new Array(windowSize);
					this.writeIdx = 0;
					this.frameCount = 0;
				}
				record(frame) {
					this.buffer[this.writeIdx] = frame;
					this.writeIdx = (this.writeIdx + 1) % this.windowSize;
					if (this.frameCount < this.windowSize) this.frameCount++;
				}
				reset() {
					this.writeIdx = 0;
					this.frameCount = 0;
					for (let i = 0; i < this.windowSize; i++) this.buffer[i] = undefined;
				}
				isLowFps() {
					if (this.frameCount < 10) return false;
					for (let i = 0; i < 10; i++) {
						const idx = (this.writeIdx - 1 - i + this.windowSize) % this.windowSize;
						const frame = this.buffer[idx];
						if (!frame || frame.renderTimeMs <= 33.3) return false;
					}
					return true;
				}
				getStats() {
					if (this.frameCount === 0) {
						return {
							frameCount: 0,
							fps: { current: 0, avg: 0, p50: 0, p95: 0, max: 0 },
							render: { current: 0, avg: 0, p50: 0, p95: 0, max: 0 },
							drawCalls: { current: 0, avg: 0 },
							batchEfficiency: 0,
							isLowFps: false,
						};
					}
					const fpsValues = [],
						renderValues = [],
						drawCallValues = [];
					for (let i = 0; i < this.frameCount; i++) {
						const idx = (this.writeIdx - this.frameCount + i + this.windowSize * 2) % this.windowSize;
						const frame = this.buffer[idx];
						if (frame) {
							fpsValues.push(frame.fps);
							renderValues.push(frame.renderTimeMs);
							drawCallValues.push(frame.drawCalls);
						}
					}
					const latestIdx = (this.writeIdx - 1 + this.windowSize) % this.windowSize;
					const latestFrame = this.buffer[latestIdx];
					const sortedFps = [...fpsValues].sort((a, b) => a - b);
					const sortedRender = [...renderValues].sort((a, b) => a - b);
					const avgFps = fpsValues.reduce((s, v) => s + v, 0) / fpsValues.length;
					const avgRender = renderValues.reduce((s, v) => s + v, 0) / renderValues.length;
					const avgDrawCalls = drawCallValues.reduce((s, v) => s + v, 0) / drawCallValues.length;
					const batchEfficiency =
						latestFrame && latestFrame.drawCalls > 0 ? latestFrame.objectCount / latestFrame.drawCalls : 0;
					return {
						frameCount: this.frameCount,
						fps: {
							current: latestFrame?.fps ?? 0,
							avg: avgFps,
							p50: percentile(sortedFps, 0.5),
							p95: percentile(sortedFps, 0.95),
							max: sortedFps[sortedFps.length - 1] ?? 0,
						},
						render: {
							current: latestFrame?.renderTimeMs ?? 0,
							avg: avgRender,
							p50: percentile(sortedRender, 0.5),
							p95: percentile(sortedRender, 0.95),
							max: sortedRender[sortedRender.length - 1] ?? 0,
						},
						drawCalls: { current: latestFrame?.drawCalls ?? 0, avg: avgDrawCalls },
						batchEfficiency,
						isLowFps: this.isLowFps(),
					};
				}
			}

			// ── BenchmarkRunner ────────────────────────────────────────────────────
			class BenchmarkRunner {
				constructor(collector, onPhaseChange, getSceneDescriptor, container) {
					this.collector = collector;
					this.onPhaseChange = onPhaseChange;
					this.getSceneDescriptor = getSceneDescriptor;
					this.container = container;
					this.phase = 'idle';
					this.warmupFrames = 0;
					this.warmupTarget = 60;
					this.currentSceneId = undefined;
					this.currentCount = 0;
					this.cleanup = undefined;
				}
				switchScene(sceneId, count) {
					if (this.cleanup) {
						this.cleanup();
						this.cleanup = undefined;
					}
					const descriptor = this.getSceneDescriptor(sceneId);
					if (descriptor) {
						try {
							this.cleanup = descriptor.build(this.container, count, factory);
						} catch (e) {
							console.error('Scene build error:', e);
						}
					}
					this.currentSceneId = sceneId;
					this.currentCount = count;
					this.warmupFrames = 0;
					this.phase = 'warmup';
					this.onPhaseChange(this.phase);
					this.collector.reset();
				}
				rebuildScene(count) {
					if (this.currentSceneId !== undefined) this.switchScene(this.currentSceneId, count);
				}
				pause() {
					if (this.phase === 'measuring') {
						this.phase = 'paused';
						this.onPhaseChange(this.phase);
					}
				}
				resume() {
					if (this.phase === 'paused') {
						this.phase = 'measuring';
						this.onPhaseChange(this.phase);
					}
				}
				resetMeasurement() {
					this.collector.reset();
					this.warmupFrames = 0;
					this.phase = 'warmup';
					this.onPhaseChange(this.phase);
				}
				onFrame(perf) {
					if (this.phase === 'idle' || this.phase === 'paused') return;
					if (this.phase === 'warmup') {
						this.warmupFrames++;
						if (this.warmupFrames >= this.warmupTarget) {
							this.phase = 'measuring';
							this.onPhaseChange(this.phase);
						}
						return;
					}
					if (this.phase === 'measuring') {
						this.collector.record({
							fps: perf.fps,
							drawCalls: perf.drawCalls,
							renderTimeMs: perf.renderTimeMs,
							objectCount: this.currentCount,
						});
					}
				}
				getPhase() {
					return this.phase;
				}
			}

			// ── PerfPanel ──────────────────────────────────────────────────────────
			function fpsColorClass(fps) {
				if (fps >= 55) return 'good';
				if (fps >= 30) return 'warn';
				return 'bad';
			}

			class PerfPanel {
				constructor(els) {
					this.els = els;
					this.fpsHistory = new Array(200).fill(0);
					this.historyWriteIdx = 0;
				}
				update(stats, phase) {
					const badge = this.els.status;
					if (phase === 'warmup') {
						badge.textContent = 'Warmup';
						badge.className = 'warmup';
						[
							this.els.fps,
							this.els.drawCalls,
							this.els.renderCurrent,
							this.els.renderAvg,
							this.els.renderP95,
							this.els.batchEfficiency,
							this.els.frameCount,
						].forEach(el => {
							el.textContent = '--';
							el.className = 'value dimmed';
						});
					} else if (phase === 'measuring') {
						badge.textContent = 'Measuring';
						badge.className = 'measuring';
						this.els.fps.textContent = stats.fps.current.toFixed(1);
						this.els.fps.className = 'value ' + fpsColorClass(stats.fps.current);
						this.els.drawCalls.textContent = String(stats.drawCalls.current);
						this.els.drawCalls.className = 'value';
						this.els.renderCurrent.textContent = stats.render.current.toFixed(2) + ' ms';
						this.els.renderCurrent.className =
							'value ' + (stats.render.current < 4 ? 'good' : stats.render.current < 8 ? 'warn' : 'bad');
						this.els.renderAvg.textContent = stats.render.avg.toFixed(2) + ' ms';
						this.els.renderAvg.className = 'value';
						this.els.renderP95.textContent = stats.render.p95.toFixed(2) + ' ms';
						this.els.renderP95.className = 'value';
						this.els.batchEfficiency.textContent = stats.batchEfficiency.toFixed(1) + 'x';
						this.els.batchEfficiency.className = 'value';
						this.els.frameCount.textContent = String(stats.frameCount);
						this.els.frameCount.className = 'value';
						this.fpsHistory[this.historyWriteIdx] = stats.fps.current;
						this.historyWriteIdx = (this.historyWriteIdx + 1) % 200;
					} else if (phase === 'paused') {
						badge.textContent = 'Paused';
						badge.className = 'paused';
					}
					this._drawGraph();
				}
				_drawGraph() {
					const canvas = this.els.graphCanvas;
					const ctx = canvas.getContext('2d');
					if (!ctx) return;
					const width = canvas.width,
						height = canvas.height,
						maxFps = 70;
					ctx.fillStyle = '#111';
					ctx.fillRect(0, 0, width, height);
					ctx.strokeStyle = '#444';
					ctx.lineWidth = 1;
					ctx.beginPath();
					ctx.moveTo(0, height - (60 / maxFps) * height);
					ctx.lineTo(width, height - (60 / maxFps) * height);
					ctx.stroke();
					const len = this.fpsHistory.length;
					for (let i = 0; i < len; i++) {
						const sampleIdx = (this.historyWriteIdx + i) % len;
						const fps = this.fpsHistory[sampleIdx];
						const x = i,
							y = height - Math.min(fps / maxFps, 1) * height;
						const cc = fpsColorClass(fps);
						ctx.strokeStyle = cc === 'good' ? '#4ade80' : cc === 'warn' ? '#fbbf24' : '#f87171';
						if (i === 0) {
							ctx.beginPath();
							ctx.moveTo(x, y);
						} else {
							const prevIdx = (this.historyWriteIdx + i - 1) % len;
							const prevCc = fpsColorClass(this.fpsHistory[prevIdx]);
							if (prevCc !== cc) {
								ctx.lineTo(x, y);
								ctx.stroke();
								ctx.beginPath();
								ctx.moveTo(x, y);
							} else ctx.lineTo(x, y);
						}
						if (i === len - 1) ctx.stroke();
					}
				}
			}

			// ── ReportExporter ─────────────────────────────────────────────────────
			class ReportExporter {
				buildReport(sceneId, objectCount, stats) {
					return {
						timestamp: new Date().toISOString(),
						userAgent: navigator.userAgent,
						scene: sceneId,
						objectCount,
						fps: { avg: stats.fps.avg, p95: stats.fps.p95, max: stats.fps.max },
						renderTimeMs: { avg: stats.render.avg, p95: stats.render.p95, max: stats.render.max },
						drawCallsAvg: stats.drawCalls.avg,
						batchEfficiencyAvg: stats.batchEfficiency,
					};
				}
				exportJSON(report) {
					const json = JSON.stringify(report, null, 2);
					const ts = report.timestamp.replace(/[:.]/g, '-').slice(0, 19);
					const blob = new Blob([json], { type: 'application/json' });
					const url = URL.createObjectURL(blob);
					const a = document.createElement('a');
					a.href = url;
					a.download = `benchmark-${report.scene}-${ts}.json`;
					a.click();
					URL.revokeObjectURL(url);
				}
				formatMarkdown(report) {
					const header =
						'| Scene | Objects | FPS avg | FPS p95 | FPS max | Render avg (ms) | Render p95 (ms) | Render max (ms) | Draw Calls avg | Batch Eff. |';
					const sep = '|---|---|---|---|---|---|---|---|---|---|';
					const row = `| ${report.scene} | ${report.objectCount} | ${report.fps.avg.toFixed(1)} | ${report.fps.p95.toFixed(1)} | ${report.fps.max.toFixed(1)} | ${report.renderTimeMs.avg.toFixed(2)} | ${report.renderTimeMs.p95.toFixed(2)} | ${report.renderTimeMs.max.toFixed(2)} | ${report.drawCallsAvg.toFixed(1)} | ${report.batchEfficiencyAvg.toFixed(2)} |`;
					return [header, sep, row].join('\n');
				}
				async copyMarkdown(report, fallback) {
					try {
						await navigator.clipboard.writeText(this.formatMarkdown(report));
					} catch {
						fallback?.(this.formatMarkdown(report));
					}
				}
			}

			// ── SceneRegistry ──────────────────────────────────────────────────────
			const scenes = [
				{
					id: 'sprite-batch',
					label: 'Sprite Batch',
					defaultCount: 500,
					minCount: 50,
					maxCount: 5000,
					build(container, count, factory) {
						const children = [];
						for (let i = 0; i < count; i++) {
							const bmp = factory.createBitmap(0);
							bmp.x = Math.random() * 760;
							bmp.y = Math.random() * 560;
							factory.addChild(container, bmp);
							children.push(bmp);
						}
						return () => children.forEach(ch => factory.removeChild(container, ch));
					},
				},
				{
					id: 'mixed-texture',
					label: 'Mixed Texture',
					defaultCount: 400,
					minCount: 50,
					maxCount: 5000,
					build(container, count, factory) {
						const children = [],
							numTextures = 8,
							perTex = Math.floor(count / numTextures);
						for (let t = 0; t < numTextures; t++) {
							for (let i = 0; i < perTex; i++) {
								const bmp = factory.createBitmap(t);
								bmp.x = Math.random() * 760;
								bmp.y = Math.random() * 560;
								factory.addChild(container, bmp);
								children.push(bmp);
							}
						}
						return () => children.forEach(ch => factory.removeChild(container, ch));
					},
				},
				{
					id: 'filter-heavy',
					label: 'Filter Heavy',
					defaultCount: 50,
					minCount: 50,
					maxCount: 200,
					build(container, count, factory) {
						const children = [];
						for (let i = 0; i < count; i++) {
							const shape = factory.createShape(i);
							shape.x = (i % 10) * 75 + 10;
							shape.y = Math.floor(i / 10) * 75 + 10;
							factory.addChild(container, shape);
							children.push(shape);
						}
						return () => children.forEach(ch => factory.removeChild(container, ch));
					},
				},
				{
					id: 'dynamic-transform',
					label: 'Dynamic Transform',
					defaultCount: 300,
					minCount: 50,
					maxCount: 5000,
					build(container, count, factory) {
						const objects = [];
						const holder = factory.createSprite();
						factory.addChild(container, holder);
						for (let i = 0; i < count; i++) {
							const bmp = factory.createBitmap(0);
							bmp.x = Math.random() * 760;
							bmp.y = Math.random() * 560;
							factory.addChild(holder, bmp);
							objects.push({
								bmp,
								phase: Math.random() * Math.PI * 2,
								speed: 0.02 + Math.random() * 0.03,
								radiusX: 100 + Math.random() * 250,
								radiusY: 80 + Math.random() * 180,
							});
						}
						const onFrame = () => {
							for (const o of objects) {
								o.phase += o.speed;
								o.bmp.x = 380 + Math.cos(o.phase) * o.radiusX;
								o.bmp.y = 280 + Math.sin(o.phase) * o.radiusY;
								o.bmp.rotation = (o.bmp.rotation ?? 0) + 1.5;
								o.bmp.alpha = 0.8;
							}
						};
						factory.addEventListener(holder, Event.ENTER_FRAME, onFrame);
						return () => {
							factory.removeEventListener(holder, Event.ENTER_FRAME, onFrame);
							factory.removeChild(container, holder);
						};
					},
				},
				{
					id: 'deep-container',
					label: 'Deep Container',
					defaultCount: 100,
					minCount: 50,
					maxCount: 2000,
					build(container, count, factory) {
						const holder = factory.createSprite();
						factory.addChild(container, holder);
						const maxDepth = 10,
							branchFactor = Math.max(2, Math.ceil(Math.pow(count, 1 / maxDepth)));
						function buildTree(parent, depth) {
							if (depth >= maxDepth) {
								factory.addChild(parent, factory.createBitmap(0));
								return;
							}
							for (let i = 0; i < branchFactor; i++) {
								const child = factory.createSprite();
								child.x = i * 10;
								child.y = depth * 5;
								factory.addChild(parent, child);
								buildTree(child, depth + 1);
							}
						}
						buildTree(holder, 0);
						return () => factory.removeChild(container, holder);
					},

				},
				{
					id: 'rapid-churn',
					label: 'Rapid Churn',
					defaultCount: 500,
					minCount: 50,
					maxCount: 3000,
					build(container, count, factory) {
						const holder = factory.createSprite();
						factory.addChild(container, holder);
						const pool = [];
						for (let i = 0; i < count; i++) {
							const bmp = factory.createBitmap(i % 8);
							bmp.x = Math.random() * 760;
							bmp.y = Math.random() * 560;
							pool.push(bmp);
						}
						const half = Math.floor(count / 2);
						for (let i = 0; i < half; i++) factory.addChild(holder, pool[i]);
						let tick = 0;
						const onFrame = () => {
							tick++;
							if (tick % 3 === 0) {
								const churnCount = Math.min(
									Math.floor(count * 0.2),
									holder.numChildren,
								pool.length - holder.numChildren
								);
								for (let i = 0; i < churnCount; i++) {
									if (holder.numChildren > 0) holder.removeChildAt(0);
								}
								let added = 0;
								for (let i = 0; i < pool.length && added < churnCount; i++) {
									if (!pool[i].parent) {
										pool[i].x = Math.random() * 760;
										pool[i].y = Math.random() * 560;
										factory.addChild(holder, pool[i]);
										added++;
									}
								}
							}
						};
						factory.addEventListener(holder, Event.ENTER_FRAME, onFrame);
						return () => {
							factory.removeEventListener(holder, Event.ENTER_FRAME, onFrame);
							factory.removeChild(container, holder);
						};
					},
				},
				{
					id: 'texture-swap',
					label: 'Texture Swap',
					defaultCount: 500,
					minCount: 50,
					maxCount: 3000,
					build(container, count, factory) {
						const holder = factory.createSprite();
						factory.addChild(container, holder);
						const objects = [];
						for (let i = 0; i < count; i++) {
							const bmp = factory.createBitmap(i % 8);
							bmp.x = Math.random() * 760;
							bmp.y = Math.random() * 560;
							factory.addChild(holder, bmp);
							objects.push(bmp);
						}
						const onFrame = () => {
							for (const o of objects) {
								if (Math.random() < 0.3) {
									o.texture = textures[Math.floor(Math.random() * 8)];
								}
								o.x += (Math.random() - 0.5) * 2;
								o.y += (Math.random() - 0.5) * 2;
							}
						};
						factory.addEventListener(holder, Event.ENTER_FRAME, onFrame);
						return () => {
							factory.removeEventListener(holder, Event.ENTER_FRAME, onFrame);
							factory.removeChild(container, holder);
						};
					},
				},
			];

			function getScene(id) {
				return scenes.find(s => s.id === id);
			}

			// ── Init Heron ─────────────────────────────────────────────────────────
			const canvas = document.getElementById('gameCanvas');
			const webglError = document.getElementById('webgl-error');
			const app = createPlayer({
				canvas,
				contentWidth: 800,
				contentHeight: 600,
				scaleMode: 'showAll',
				frameRate: 60,
			});

			if (app.player && app.player.isWebGL === false) {
				canvas.style.display = 'none';
				webglError.style.display = 'flex';
				throw new Error('WebGL not available');
			}

			const root = new Sprite();
			app.start(root);

			// ── Pre-create 8 textures ──────────────────────────────────────────────
			const textures = [];
			for (let i = 0; i < 8; i++) {
				const c = document.createElement('canvas');
				c.width = c.height = 32;
				const ctx = c.getContext('2d');
				ctx.fillStyle = `hsl(${(i / 8) * 360}, 80%, 60%)`;
				ctx.fillRect(0, 0, 32, 32);
				const bd = new BitmapData(c);
				const tex = new Texture();
				tex.setBitmapData(bd);
				textures.push(tex);
			}

			// ── SceneFactory ───────────────────────────────────────────────────────
			const factory = {
				createBitmap(texIndex = 0) {
					return new Bitmap(textures[texIndex % textures.length]);
				},
				createShape(index = 0) {
					const s = new Shape();
					const color = Math.floor(Math.random() * 0xffffff);
					s.graphics.beginFill(color, 1);
					s.graphics.drawRect(0, 0, 40, 40);
					s.graphics.endFill();
					s.filters = index % 2 === 0 ? [new BlurFilter(4, 4)] : [new GlowFilter(0xffffff, 0.8, 6, 6, 1)];
					return s;
				},
				createSprite() {
					return new Sprite();
				},
				addChild(parent, child) {
					parent.addChild(child);
				},
				removeChild(parent, child) {
					parent.removeChild(child);
				},
				addEventListener(target, event, handler) {
					target.addEventListener(event, handler);
				},
				removeEventListener(target, event, handler) {
					target.removeEventListener(event, handler);
				},
			};

			// ── Core instances ─────────────────────────────────────────────────────
			const collector = new MetricsCollector(300);
			const exporter = new ReportExporter();
			const $ = id => document.getElementById(id);
			const panel = new PerfPanel({
				fps: $('m-fps'),
				drawCalls: $('m-dc'),
				renderCurrent: $('m-render'),
				renderAvg: $('m-avg-render'),
				renderP95: $('m-p95-render'),
				batchEfficiency: $('m-batch'),
				frameCount: $('m-frames'),
				status: $('status-badge'),
				graphCanvas: $('fps-graph'),
			});

			let currentSceneId = 'dynamic-transform',
				currentCount = 300;
			const runner = new BenchmarkRunner(collector, () => {}, getScene, root);

			// ── Frame loop ─────────────────────────────────────────────────────────
			const frameProxy = new Sprite();
			root.addChild(frameProxy);
			frameProxy.addEventListener(Event.ENTER_FRAME, () => {
				const perf = app.player.perf;
				runner.onFrame({ fps: perf.fps, drawCalls: perf.drawCalls, renderTimeMs: perf.renderTimeMs });
				panel.update(collector.getStats(), runner.getPhase());
			});

			// ── Scene switch helper ────────────────────────────────────────────────
			function switchToScene(sceneId, count) {
				currentSceneId = sceneId;
				currentCount = count;
				runner.switchScene(sceneId, count);
				const scene = getScene(sceneId);
				if (scene) {
					const slider = $('count-slider');
					slider.min = scene.minCount;
					slider.max = scene.maxCount;
					const clamped = Math.max(scene.minCount, Math.min(scene.maxCount, parseInt(slider.value)));
					slider.value = clamped;
					$('count-display').textContent = clamped;
					currentCount = clamped;
				}
			}

			// ── Controls ───────────────────────────────────────────────────────────
			document.querySelectorAll('input[name="scene"]').forEach(radio => {
				radio.addEventListener('change', () => {
					if (radio.checked) switchToScene(radio.value, currentCount);
				});
			});

			$('count-slider').addEventListener('input', function () {
				const val = parseInt(this.value);
				$('count-display').textContent = val;
				currentCount = val;
				runner.rebuildScene(val);
			});

			$('btn-reset').addEventListener('click', () => runner.resetMeasurement());

			const btnPause = $('btn-pause');
			btnPause.addEventListener('click', () => {
				const phase = runner.getPhase();
				if (phase === 'measuring') {
					runner.pause();
					btnPause.textContent = 'Resume';
				} else if (phase === 'paused') {
					runner.resume();
					btnPause.textContent = 'Pause';
				}
			});

			$('btn-export-json').addEventListener('click', () => {
				exporter.exportJSON(exporter.buildReport(currentSceneId, currentCount, collector.getStats()));
			});

			$('btn-copy-md').addEventListener('click', async () => {
				await exporter.copyMarkdown(
					exporter.buildReport(currentSceneId, currentCount, collector.getStats()),
					text => {
						$('fallback-textarea').value = text;
						$('fallback-textarea-wrap').style.display = 'block';
					},
				);
				showToast('Copied to clipboard');
			});

			$('btn-close-fallback').addEventListener('click', () => {
				$('fallback-textarea-wrap').style.display = 'none';
			});

			function showToast(msg) {
				const toast = $('toast');
				toast.textContent = msg;
				toast.classList.add('show');
				setTimeout(() => toast.classList.remove('show'), 2000);
			}

			switchToScene('dynamic-transform', 300);
		</script>
	</body>
</html>
