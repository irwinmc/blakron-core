<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Bitmap Test</title>
		<style>
			body {
				margin: 0;
				background: #1a1a2e;
				display: flex;
				flex-direction: column;
				align-items: center;
				font-family: monospace;
				color: #eee;
			}
			canvas {
				border: 1px solid #444;
				margin: 10px;
			}
			h3 {
				margin: 5px 0;
				font-size: 13px;
				color: #aaa;
			}
			#perf-panel {
				position: fixed;
				top: 10px;
				right: 10px;
				background: rgba(0,0,0,0.85);
				border: 1px solid #555;
				border-radius: 6px;
				padding: 10px 14px;
				font-family: monospace;
				font-size: 12px;
				color: #eee;
				line-height: 1.7;
				min-width: 220px;
				z-index: 1000;
				user-select: none;
			}
			#perf-panel h4 {
				margin: 0 0 6px 0;
				padding-bottom: 4px;
				border-bottom: 1px solid #555;
				font-size: 13px;
				color: #8cf;
			}
			#perf-panel .row { display: flex; justify-content: space-between; }
			#perf-panel .label { color: #aaa; }
			#perf-panel .value { color: #fff; font-weight: bold; }
			#perf-panel .good { color: #4f4; }
			#perf-panel .warn { color: #ff4; }
			#perf-panel .bad  { color: #f44; }
			#perf-panel canvas {
				border: none;
				margin: 6px 0 0 0;
				width: 100%;
				height: 40px;
			}
		</style>
	</head>
	<body>
		<h2>Bitmap 渲染测试</h2>
		<canvas id="gameCanvas" width="800" height="600"></canvas>
		<div id="perf-panel">
			<h4>Heron Performance</h4>
			<div class="row"><span class="label">FPS</span><span class="value" id="pf-fps">--</span></div>
			<div class="row"><span class="label">Draw Calls</span><span class="value" id="pf-dc">--</span></div>
			<div class="row"><span class="label">Render</span><span class="value" id="pf-rt">--</span></div>
			<div class="row"><span class="label">Avg Render</span><span class="value" id="pf-art">--</span></div>
			<div class="row"><span class="label">Max Render</span><span class="value" id="pf-mrt">--</span></div>
			<div class="row"><span class="label">Frames</span><span class="value" id="pf-fc">--</span></div>
			<canvas id="pf-graph" width="200" height="40"></canvas>
		</div>

		<script type="module">
			import {
				createPlayer,
				Sprite,
				Shape,
				Bitmap,
				BitmapData,
				Texture,
				SpriteSheet,
				BlurFilter,
				Rectangle,
			} from '../src/index.js';

			const canvas = document.getElementById('gameCanvas');
			const app = createPlayer({
				canvas,
				contentWidth: 800,
				contentHeight: 600,
				scaleMode: 'showAll',
				frameRate: 60,
			});

			const root = new Sprite();
			app.start(root);

			// ── Helper: create a test image on a canvas ────────────────────────
			function makeTestImage(w, h, drawFn) {
				const c = document.createElement('canvas');
				c.width = w;
				c.height = h;
				const ctx = c.getContext('2d');
				drawFn(ctx, w, h);
				return c;
			}

			// ── Helper: canvas → BitmapData → Texture → Bitmap ─────────────────
			function canvasToBitmap(canvasEl, x, y, w, h) {
				const bd = new BitmapData(canvasEl);
				const tex = new Texture();
				tex.setBitmapData(bd);
				const bmp = new Bitmap(tex);
				if (w) bmp.width = w;
				if (h) bmp.height = h;
				bmp.x = x;
				bmp.y = y;
				return bmp;
			}

			// ── Test 1: Simple image ────────────────────────────────────────────
			const img1 = makeTestImage(80, 80, (ctx, w, h) => {
				const g = ctx.createLinearGradient(0, 0, w, h);
				g.addColorStop(0, '#ff4444');
				g.addColorStop(1, '#4444ff');
				ctx.fillStyle = g;
				ctx.fillRect(0, 0, w, h);
				ctx.fillStyle = '#fff';
				ctx.font = 'bold 14px monospace';
				ctx.textAlign = 'center';
				ctx.fillText('Test 1', w / 2, h / 2 + 5);
			});
			root.addChild(canvasToBitmap(img1, 20, 20));

			// ── Test 2: Scaled image ────────────────────────────────────────────
			const img2 = makeTestImage(40, 40, (ctx, w, h) => {
				ctx.fillStyle = '#44ff44';
				ctx.beginPath();
				ctx.arc(w / 2, h / 2, w / 2, 0, Math.PI * 2);
				ctx.fill();
				ctx.fillStyle = '#000';
				ctx.font = '10px monospace';
				ctx.textAlign = 'center';
				ctx.fillText('2x', w / 2, h / 2 + 3);
			});
			root.addChild(canvasToBitmap(img2, 120, 20, 80, 80));

			// ── Test 3: Rotation + Alpha ────────────────────────────────────────
			const img3 = makeTestImage(60, 60, (ctx, w, h) => {
				ctx.fillStyle = '#ffff00';
				ctx.fillRect(0, 0, w, h);
				ctx.fillStyle = '#000';
				ctx.font = '10px monospace';
				ctx.textAlign = 'center';
				ctx.fillText('rotate', w / 2, h / 2 + 3);
			});
			const bmp3 = canvasToBitmap(img3, 280, 50);
			bmp3.rotation = 30;
			bmp3.alpha = 0.7;
			bmp3.anchorOffsetX = 30;
			bmp3.anchorOffsetY = 30;
			root.addChild(bmp3);

			// ── Test 4: SpriteSheet sub-textures ────────────────────────────────
			const sheetCanvas = makeTestImage(128, 32, (ctx) => {
				const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00'];
				for (let i = 0; i < 4; i++) {
					ctx.fillStyle = colors[i];
					ctx.fillRect(i * 32, 0, 32, 32);
					ctx.fillStyle = '#fff';
					ctx.font = 'bold 9px monospace';
					ctx.textAlign = 'center';
					ctx.fillText(`S${i}`, i * 32 + 16, 20);
				}
			});
			const sheetBd = new BitmapData(sheetCanvas);
			const sheetTex = new Texture();
			sheetTex.setBitmapData(sheetBd);
			const sheet = new SpriteSheet(sheetTex);
			for (let i = 0; i < 4; i++) {
				const subTex = sheet.createTexture(`s${i}`, i * 32, 0, 32, 32);
				const bmp = new Bitmap(subTex);
				bmp.x = 380 + i * 40;
				bmp.y = 20;
				root.addChild(bmp);
			}

			// ── Test 5: Bitmap with filter ─────────────────────────────────────
			const img5 = makeTestImage(60, 60, (ctx, w, h) => {
				ctx.fillStyle = '#ff00ff';
				ctx.fillRect(0, 0, w, h);
				ctx.fillStyle = '#fff';
				ctx.font = 'bold 10px monospace';
				ctx.textAlign = 'center';
				ctx.fillText('blur', w / 2, h / 2 + 3);
			});
			const bmp5 = canvasToBitmap(img5, 20, 130);
			bmp5.filters = [new BlurFilter(6, 6)];
			root.addChild(bmp5);

			// ── Test 6: Multiple bitmaps (batch test) ──────────────────────────
			const batchImg = makeTestImage(20, 20, (ctx, w, h) => {
				ctx.fillStyle = '#00ffff';
				ctx.fillRect(0, 0, w, h);
			});
			const batchBd = new BitmapData(batchImg);
			for (let row = 0; row < 5; row++) {
				for (let col = 0; col < 10; col++) {
					const tex = new Texture();
					tex.setBitmapData(batchBd);
					const bmp = new Bitmap(tex);
					bmp.x = 120 + col * 22;
					bmp.y = 130 + row * 22;
					root.addChild(bmp);
				}
			}

			// ── Test 7: scale9Grid ─────────────────────────────────────────────
			const s9Canvas = makeTestImage(60, 60, (ctx, w, h) => {
				ctx.fillStyle = '#ffcc00';
				ctx.fillRect(0, 0, w, h);
				ctx.strokeStyle = '#ff8800';
				ctx.lineWidth = 3;
				ctx.strokeRect(1.5, 1.5, 57, 57);
				ctx.strokeStyle = '#ff4400';
				ctx.lineWidth = 2;
				ctx.strokeRect(14, 14, 32, 32);
				ctx.fillStyle = '#ff0000';
				ctx.fillRect(4, 4, 8, 8);
				ctx.fillRect(48, 4, 8, 8);
				ctx.fillRect(4, 48, 8, 8);
				ctx.fillRect(48, 48, 8, 8);
			});
			const bmp7 = canvasToBitmap(s9Canvas, 20, 280);
			bmp7.width = 160;
			bmp7.height = 120;
			bmp7.scale9Grid = new Rectangle(15, 15, 30, 30);
			root.addChild(bmp7);

			// ── Test 8: Animated bitmap (rotation) ─────────────────────────────
			const animImg = makeTestImage(40, 40, (ctx, w, h) => {
				ctx.fillStyle = '#ff4444';
				ctx.fillRect(0, 0, w, h);
				ctx.fillStyle = '#fff';
				ctx.font = 'bold 10px monospace';
				ctx.textAlign = 'center';
				ctx.fillText('spin', w / 2, h / 2 + 3);
			});
			const animBmp = canvasToBitmap(animImg, 400, 130);
			animBmp.anchorOffsetX = 20;
			animBmp.anchorOffsetY = 20;
			root.addChild(animBmp);

			const { Event } = await import('../src/heron/events/Event.js');
			animBmp.addEventListener(Event.ENTER_FRAME, () => {
				animBmp.rotation += 2;
			});

			// ── Test 9: Bitmap from URL (async) ─────────────────────────────────
			const urlBmp = new Bitmap();
			urlBmp.x = 400;
			urlBmp.y = 280;
			root.addChild(urlBmp);

			// Generate a data URL as a simulated remote image
			const remoteCanvas = makeTestImage(80, 60, (ctx, w, h) => {
				const g = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, w / 2);
				g.addColorStop(0, '#ffffff');
				g.addColorStop(1, '#4488ff');
				ctx.fillStyle = g;
				ctx.fillRect(0, 0, w, h);
				ctx.fillStyle = '#000';
				ctx.font = 'bold 10px monospace';
				ctx.textAlign = 'center';
				ctx.fillText('async load', w / 2, h / 2 + 3);
			});

			// Simulate async loading
			const img = new Image();
			img.src = remoteCanvas.toDataURL();
			img.onload = () => {
				const bd = new BitmapData(img);
				const tex = new Texture();
				tex.setBitmapData(bd);
				urlBmp.texture = tex;
			};

			console.log('--- All Bitmap tests set up ---');

			// ── Performance Panel ─────────────────────────────────────────────────
			const $ = id => document.getElementById(id);
			const pfFps = $('pf-fps'), pfDc = $('pf-dc'), pfRt = $('pf-rt');
			const pfArt = $('pf-art'), pfMrt = $('pf-mrt'), pfFc = $('pf-fc');
			const graphCanvas = $('pf-graph');
			const graphCtx = graphCanvas.getContext('2d');
			const fpsHistory = new Array(200).fill(0);
			let graphIdx = 0;

			function updatePerfPanel() {
				const p = app.player.perf;
				pfFps.textContent = p.fps.toFixed(1);
				pfFps.className = 'value ' + (p.fps >= 55 ? 'good' : p.fps >= 30 ? 'warn' : 'bad');
				pfDc.textContent = p.drawCalls;
				pfRt.textContent = p.renderTimeMs.toFixed(2) + ' ms';
				pfRt.className = 'value ' + (p.renderTimeMs < 4 ? 'good' : p.renderTimeMs < 8 ? 'warn' : 'bad');
				pfArt.textContent = p.avgRenderTimeMs.toFixed(2) + ' ms';
				pfMrt.textContent = p.maxRenderTimeMs.toFixed(2) + ' ms';
				pfFc.textContent = p.frameCount;

				fpsHistory[graphIdx % 200] = p.fps;
				graphIdx++;

				const gw = graphCanvas.width, gh = graphCanvas.height;
				graphCtx.fillStyle = '#111';
				graphCtx.fillRect(0, 0, gw, gh);
				graphCtx.strokeStyle = '#333';
				graphCtx.beginPath();
				graphCtx.moveTo(0, gh * (1 - 60 / 70));
				graphCtx.lineTo(gw, gh * (1 - 60 / 70));
				graphCtx.stroke();
				graphCtx.strokeStyle = '#4f4';
				graphCtx.beginPath();
				for (let i = 0; i < 200; i++) {
					const idx = (graphIdx + i) % 200;
					const x = (i / 200) * gw;
					const y = gh * (1 - Math.min(fpsHistory[idx], 70) / 70);
					i === 0 ? graphCtx.moveTo(x, y) : graphCtx.lineTo(x, y);
				}
				graphCtx.stroke();
				requestAnimationFrame(updatePerfPanel);
			}
			requestAnimationFrame(updatePerfPanel);
		</script>
	</body>
</html>
