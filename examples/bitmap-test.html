<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Bitmap Test</title>
		<link rel="stylesheet" href="style.css" />
		<style>
			:root {
				--sidebar-w: 240px;
				--log-h: 320px;
			}
			#pf-graph {
				border: none;
				width: 100%;
				height: 40px;
				margin-top: 6px;
				display: block;
			}
		</style>
	</head>
	<body>
		<div class="header">
			<a href="index.html" class="back-link">&larr; Back</a>
			<span class="page-title">Bitmap Test</span>
			<div class="header-right">
				<div id="fps-display" class="fps-badge">-- FPS</div>
			</div>
		</div>
		<div class="main">
			<div class="sidebar">
				<div class="glass-card">
					<h3>Performance</h3>
					<div class="perf-row">
						<span class="label">FPS</span>
						<span class="value" id="pf-fps">--</span>
					</div>
					<div class="perf-row">
						<span class="label">Draw Calls</span>
						<span class="value" id="pf-dc">--</span>
					</div>
					<div class="perf-row">
						<span class="label">Render</span>
						<span class="value" id="pf-rt">--</span>
					</div>
					<div class="perf-row">
						<span class="label">Avg Render</span>
						<span class="value" id="pf-art">--</span>
					</div>
					<div class="perf-row">
						<span class="label">Max Render</span>
						<span class="value" id="pf-mrt">--</span>
					</div>
					<div class="perf-row">
						<span class="label">Frames</span>
						<span class="value" id="pf-fc">--</span>
					</div>
					<canvas id="pf-graph" width="200" height="40"></canvas>
				</div>
			</div>
			<div class="right-panel">
				<div id="canvas-wrap">
					<canvas id="gameCanvas" width="800" height="600"></canvas>
				</div>
				<div class="log-panel">
					<div class="log-header"><span>Event Log</span></div>
					<div id="log"></div>
				</div>
			</div>
		</div>

		<script type="module">
			import {
				createPlayer,
				Sprite,
				Shape,
				Bitmap,
				BitmapData,
				Texture,
				SpriteSheet,
				BlurFilter,
				Rectangle,
			} from '../src/index.js';

			const logEl = document.getElementById('log');
			const logT0 = Date.now();
			function info(msg) {
				const elapsed = ((Date.now() - logT0) / 1000).toFixed(1);
				const entry = document.createElement('div');
				entry.className = 'log-entry';
				entry.innerHTML =
					`<span class="log-time">${elapsed}s</span>` +
					`<span class="log-tag tag-event">[TEST]</span>` +
					`<span class="log-msg">${msg}</span>`;
				logEl.appendChild(entry);
				logEl.scrollTop = logEl.scrollHeight;
				console.log(msg);
			}

			const canvas = document.getElementById('gameCanvas');
			const app = createPlayer({
				canvas,
				contentWidth: 800,
				contentHeight: 600,
				scaleMode: 'noScale',
				frameRate: 60,
			});
			const root = new Sprite();
			app.start(root);
			info('Player started 800x600');

			// ── Helpers ────────────────────────────────────────────────────────
			function makeTestImage(w, h, drawFn) {
				const c = document.createElement('canvas');
				c.width = w;
				c.height = h;
				drawFn(c.getContext('2d'), w, h);
				return c;
			}
			function canvasToBitmap(canvasEl, x, y, w, h) {
				const bd = new BitmapData(canvasEl);
				const tex = new Texture();
				tex.setBitmapData(bd);
				const bmp = new Bitmap(tex);
				if (w) bmp.width = w;
				if (h) bmp.height = h;
				bmp.x = x;
				bmp.y = y;
				return bmp;
			}

			// ── Test 1: Simple image ───────────────────────────────────────────
			root.addChild(
				canvasToBitmap(
					makeTestImage(80, 80, (ctx, w, h) => {
						const g = ctx.createLinearGradient(0, 0, w, h);
						g.addColorStop(0, '#ff4444');
						g.addColorStop(1, '#4444ff');
						ctx.fillStyle = g;
						ctx.fillRect(0, 0, w, h);
						ctx.fillStyle = '#fff';
						ctx.font = 'bold 14px monospace';
						ctx.textAlign = 'center';
						ctx.fillText('Test 1', w / 2, h / 2 + 5);
					}),
					20,
					20,
				),
			);
			info('1: Gradient image');

			// ── Test 2: Scaled image ───────────────────────────────────────────
			root.addChild(
				canvasToBitmap(
					makeTestImage(40, 40, (ctx, w, h) => {
						ctx.fillStyle = '#44ff44';
						ctx.beginPath();
						ctx.arc(w / 2, h / 2, w / 2, 0, Math.PI * 2);
						ctx.fill();
						ctx.fillStyle = '#000';
						ctx.font = '10px monospace';
						ctx.textAlign = 'center';
						ctx.fillText('2x', w / 2, h / 2 + 3);
					}),
					120,
					20,
					80,
					80,
				),
			);
			info('2: Scaled circle 2x');

			// ── Test 3: Rotation + Alpha ───────────────────────────────────────
			const bmp3 = canvasToBitmap(
				makeTestImage(60, 60, (ctx, w, h) => {
					ctx.fillStyle = '#ffff00';
					ctx.fillRect(0, 0, w, h);
					ctx.fillStyle = '#000';
					ctx.font = '10px monospace';
					ctx.textAlign = 'center';
					ctx.fillText('rotate', w / 2, h / 2 + 3);
				}),
				280,
				50,
			);
			bmp3.rotation = 30;
			bmp3.alpha = 0.7;
			bmp3.anchorOffsetX = 30;
			bmp3.anchorOffsetY = 30;
			root.addChild(bmp3);
			info('3: Rotation 30 + alpha 0.7');

			// ── Test 4: SpriteSheet ────────────────────────────────────────────
			const sheetCanvas = makeTestImage(128, 32, ctx => {
				const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00'];
				for (let i = 0; i < 4; i++) {
					ctx.fillStyle = colors[i];
					ctx.fillRect(i * 32, 0, 32, 32);
					ctx.fillStyle = '#fff';
					ctx.font = 'bold 9px monospace';
					ctx.textAlign = 'center';
					ctx.fillText(`S${i}`, i * 32 + 16, 20);
				}
			});
			const sheetBd = new BitmapData(sheetCanvas);
			const sheetTex = new Texture();
			sheetTex.setBitmapData(sheetBd);
			const sheet = new SpriteSheet(sheetTex);
			for (let i = 0; i < 4; i++) {
				const subTex = sheet.createTexture(`s${i}`, i * 32, 0, 32, 32);
				const bmp = new Bitmap(subTex);
				bmp.x = 380 + i * 40;
				bmp.y = 20;
				root.addChild(bmp);
			}
			info('4: SpriteSheet 4 sub-textures');

			// ── Test 5: Bitmap + BlurFilter ────────────────────────────────────
			const bmp5 = canvasToBitmap(
				makeTestImage(60, 60, (ctx, w, h) => {
					ctx.fillStyle = '#ff00ff';
					ctx.fillRect(0, 0, w, h);
					ctx.fillStyle = '#fff';
					ctx.font = 'bold 10px monospace';
					ctx.textAlign = 'center';
					ctx.fillText('blur', w / 2, h / 2 + 3);
				}),
				20,
				130,
			);
			bmp5.filters = [new BlurFilter(6, 6)];
			root.addChild(bmp5);
			info('5: Bitmap + BlurFilter(6,6)');

			// ── Test 6: Batch (50 bitmaps) ─────────────────────────────────────
			const batchImg = makeTestImage(20, 20, (ctx, w, h) => {
				ctx.fillStyle = '#00ffff';
				ctx.fillRect(0, 0, w, h);
			});
			const batchBd = new BitmapData(batchImg);
			for (let row = 0; row < 5; row++) {
				for (let col = 0; col < 10; col++) {
					const tex = new Texture();
					tex.setBitmapData(batchBd);
					const bmp = new Bitmap(tex);
					bmp.x = 120 + col * 22;
					bmp.y = 130 + row * 22;
					root.addChild(bmp);
				}
			}
			info('6: 50 bitmaps batch (5x10)');

			// ── Test 7: scale9Grid ─────────────────────────────────────────────
			const bmp7 = canvasToBitmap(
				makeTestImage(60, 60, (ctx, w, h) => {
					ctx.fillStyle = '#ffcc00';
					ctx.fillRect(0, 0, w, h);
					ctx.strokeStyle = '#ff8800';
					ctx.lineWidth = 3;
					ctx.strokeRect(1.5, 1.5, 57, 57);
					ctx.strokeStyle = '#ff4400';
					ctx.lineWidth = 2;
					ctx.strokeRect(14, 14, 32, 32);
					ctx.fillStyle = '#ff0000';
					ctx.fillRect(4, 4, 8, 8);
					ctx.fillRect(48, 4, 8, 8);
					ctx.fillRect(4, 48, 8, 8);
					ctx.fillRect(48, 48, 8, 8);
				}),
				20,
				280,
			);
			bmp7.width = 160;
			bmp7.height = 120;
			bmp7.scale9Grid = new Rectangle(15, 15, 30, 30);
			root.addChild(bmp7);
			info('7: scale9Grid (60 to 160x120)');

			// ── Test 8: Animated bitmap ────────────────────────────────────────
			const animBmp = canvasToBitmap(
				makeTestImage(40, 40, (ctx, w, h) => {
					ctx.fillStyle = '#ff4444';
					ctx.fillRect(0, 0, w, h);
					ctx.fillStyle = '#fff';
					ctx.font = 'bold 10px monospace';
					ctx.textAlign = 'center';
					ctx.fillText('spin', w / 2, h / 2 + 3);
				}),
				400,
				130,
			);
			animBmp.anchorOffsetX = 20;
			animBmp.anchorOffsetY = 20;
			root.addChild(animBmp);
			const { Event } = await import('../src/blakron/events/Event.js');
			animBmp.addEventListener(Event.ENTER_FRAME, () => {
				animBmp.rotation += 2;
			});
			info('8: Spinning bitmap');

			// ── Test 9: Async bitmap ───────────────────────────────────────────
			const urlBmp = new Bitmap();
			urlBmp.x = 400;
			urlBmp.y = 280;
			root.addChild(urlBmp);
			const remoteCanvas = makeTestImage(80, 60, (ctx, w, h) => {
				const g = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, w / 2);
				g.addColorStop(0, '#ffffff');
				g.addColorStop(1, '#4488ff');
				ctx.fillStyle = g;
				ctx.fillRect(0, 0, w, h);
				ctx.fillStyle = '#000';
				ctx.font = 'bold 10px monospace';
				ctx.textAlign = 'center';
				ctx.fillText('async load', w / 2, h / 2 + 3);
			});
			const img = new Image();
			img.src = remoteCanvas.toDataURL();
			img.onload = () => {
				const bd = new BitmapData(img);
				const tex = new Texture();
				tex.setBitmapData(bd);
				urlBmp.texture = tex;
				info('9: Async bitmap loaded');
			};
			info('9: Async loading...');
			info('--- All 9 bitmap tests set up ---');

			// ── Perf + FPS ─────────────────────────────────────────────────────
			const $ = id => document.getElementById(id);
			const pfFps = $('pf-fps'),
				pfDc = $('pf-dc'),
				pfRt = $('pf-rt');
			const pfArt = $('pf-art'),
				pfMrt = $('pf-mrt'),
				pfFc = $('pf-fc');
			const graphCanvas = $('pf-graph');
			const graphCtx = graphCanvas.getContext('2d');
			const fpsHistory = new Array(200).fill(0);
			let graphIdx = 0;

			const fpsEl = $('fps-display');
			let fpsFrames = 0,
				fpsLast = performance.now();
			(function fpsLoop() {
				fpsFrames++;
				const now = performance.now();
				if (now - fpsLast >= 500) {
					const fps = Math.round((fpsFrames / (now - fpsLast)) * 1000);
					fpsEl.textContent = fps + ' FPS';
					fpsEl.className = 'fps-badge' + (fps > 50 ? '' : fps > 30 ? ' warn' : ' bad');
					fpsFrames = 0;
					fpsLast = now;
				}
				requestAnimationFrame(fpsLoop);
			})();

			function updatePerfPanel() {
				const p = app.player.perf;
				pfFps.textContent = p.fps.toFixed(1);
				pfFps.className = 'value ' + (p.fps >= 55 ? 'good' : p.fps >= 30 ? 'warn' : 'bad');
				pfDc.textContent = p.drawCalls;
				pfRt.textContent = p.renderTimeMs.toFixed(2) + ' ms';
				pfRt.className = 'value ' + (p.renderTimeMs < 4 ? 'good' : p.renderTimeMs < 8 ? 'warn' : 'bad');
				pfArt.textContent = p.avgRenderTimeMs.toFixed(2) + ' ms';
				pfMrt.textContent = p.maxRenderTimeMs.toFixed(2) + ' ms';
				pfFc.textContent = p.frameCount;

				fpsHistory[graphIdx % 200] = p.fps;
				graphIdx++;
				const gw = graphCanvas.width,
					gh = graphCanvas.height;
				graphCtx.fillStyle = '#f0f2f7';
				graphCtx.fillRect(0, 0, gw, gh);
				graphCtx.strokeStyle = '#c8ccd8';
				graphCtx.beginPath();
				graphCtx.moveTo(0, gh * (1 - 60 / 70));
				graphCtx.lineTo(gw, gh * (1 - 60 / 70));
				graphCtx.stroke();
				graphCtx.strokeStyle = '#16a34a';
				graphCtx.beginPath();
				for (let i = 0; i < 200; i++) {
					const idx = (graphIdx + i) % 200;
					const x = (i / 200) * gw;
					const y = gh * (1 - Math.min(fpsHistory[idx], 70) / 70);
					i === 0 ? graphCtx.moveTo(x, y) : graphCtx.lineTo(x, y);
				}
				graphCtx.stroke();
				requestAnimationFrame(updatePerfPanel);
			}
			requestAnimationFrame(updatePerfPanel);
		</script>
	</body>
</html>
