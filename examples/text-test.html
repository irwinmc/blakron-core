<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Text Test</title>
		<style>
			:root {
				--bg: #0a0b14;
				--bg-deep: #060710;
				--glass: rgba(255, 255, 255, 0.035);
				--glass-border: rgba(255, 255, 255, 0.07);
				--accent: #6c9cff;
				--success: #4ade80;
				--warning: #fbbf24;
				--error: #f87171;
				--text: #e0e0e8;
				--text-muted: #8888a0;
				--text-dim: #55556a;
			}
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			body {
				background: var(--bg);
				color: var(--text);
				font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
				font-size: 12px;
				display: flex;
				flex-direction: column;
				height: 100vh;
				overflow: hidden;
			}
			body::before {
				content: '';
				position: fixed;
				inset: 0;
				background:
					radial-gradient(ellipse 600px 400px at 15% 80%, rgba(108, 156, 255, 0.06) 0%, transparent 70%),
					radial-gradient(ellipse 500px 500px at 85% 20%, rgba(167, 139, 250, 0.04) 0%, transparent 70%);
				pointer-events: none;
				z-index: 0;
			}
			.header {
				display: flex;
				align-items: center;
				gap: 16px;
				padding: 0 20px;
				height: 48px;
				border-bottom: 1px solid var(--glass-border);
				background: rgba(10, 11, 20, 0.85);
				backdrop-filter: blur(20px);
				flex-shrink: 0;
				position: relative;
				z-index: 10;
			}
			.back-link {
				display: flex;
				align-items: center;
				gap: 6px;
				color: var(--text-muted);
				text-decoration: none;
				font-size: 12px;
				padding: 4px 10px;
				border-radius: 6px;
				border: 1px solid transparent;
				transition: all 0.2s;
			}
			.back-link:hover {
				color: var(--accent);
				border-color: var(--glass-border);
				background: var(--glass);
			}
			.page-title {
				font-size: 13px;
				font-weight: 600;
				color: var(--text);
			}
			.header-right {
				margin-left: auto;
				display: flex;
				align-items: center;
				gap: 14px;
			}
			.fps-badge {
				font-size: 11px;
				font-weight: 600;
				padding: 3px 10px;
				border-radius: 6px;
				background: rgba(74, 222, 128, 0.1);
				border: 1px solid rgba(74, 222, 128, 0.2);
				color: var(--success);
				font-variant-numeric: tabular-nums;
				min-width: 68px;
				text-align: center;
			}
			.main {
				display: flex;
				flex: 1;
				overflow: hidden;
				position: relative;
				z-index: 1;
			}
			.right-panel {
				flex: 1;
				display: flex;
				flex-direction: column;
				overflow: hidden;
			}
			#canvas-wrap {
				flex: 1;
				display: flex;
				align-items: center;
				justify-content: center;
				background: var(--bg-deep);
				position: relative;
				overflow: hidden;
			}
			#canvas-wrap::before {
				content: '';
				position: absolute;
				inset: 0;
				background: radial-gradient(circle at 50% 50%, rgba(108, 156, 255, 0.03) 0%, transparent 60%);
				pointer-events: none;
			}
			canvas {
				border: 1px solid var(--glass-border);
				border-radius: 4px;
			}
			.log-panel {
				height: 300px;
				border-top: 1px solid var(--glass-border);
				display: flex;
				flex-direction: column;
				overflow: hidden;
				background: rgba(6, 7, 16, 0.6);
				backdrop-filter: blur(12px);
			}
			.log-header {
				padding: 6px 14px;
				border-bottom: 1px solid var(--glass-border);
				display: flex;
				align-items: center;
				gap: 10px;
				flex-shrink: 0;
			}
			.log-header span {
				font-size: 10px;
				font-weight: 600;
				color: var(--text-muted);
				text-transform: uppercase;
				letter-spacing: 0.08em;
			}
			#log {
				flex: 1;
				overflow-y: auto;
				padding: 6px 14px;
				line-height: 1.7;
				font-size: 11px;
			}
			#log::-webkit-scrollbar {
				width: 4px;
			}
			#log::-webkit-scrollbar-track {
				background: transparent;
			}
			#log::-webkit-scrollbar-thumb {
				background: rgba(255, 255, 255, 0.06);
				border-radius: 4px;
			}
			.log-entry {
				display: flex;
				gap: 10px;
				padding: 1px 0;
				border-bottom: 1px solid rgba(255, 255, 255, 0.02);
			}
			.log-time {
				color: var(--text-dim);
				flex-shrink: 0;
				width: 60px;
				font-variant-numeric: tabular-nums;
			}
			.log-tag {
				flex-shrink: 0;
				width: 72px;
				font-weight: 600;
			}
			.log-msg {
				color: var(--text-muted);
			}
			.tag-pass {
				color: #4ade80;
			}
			.tag-fail {
				color: #f87171;
			}
			.tag-info {
				color: var(--text-dim);
			}
		</style>
	</head>
	<body>
		<div class="header">
			<a href="index.html" class="back-link">&larr; Back</a>
			<span class="page-title">TextField Test</span>
			<div class="header-right">
				<div id="fps-display" class="fps-badge">-- FPS</div>
			</div>
		</div>
		<div class="main">
			<div class="right-panel">
				<div id="canvas-wrap">
					<canvas id="gameCanvas" width="800" height="600"></canvas>
				</div>
				<div class="log-panel">
					<div class="log-header"><span>Test Results</span></div>
					<div id="log"></div>
				</div>
			</div>
		</div>

		<script type="module">
			import {
				createPlayer,
				Sprite,
				TextField,
				HorizontalAlign,
				VerticalAlign,
				TextFieldType,
				TextEvent,
			} from '../src/index.js';

			const logEl = document.getElementById('log');
			const logT0 = Date.now();
			let passCount = 0;
			let failCount = 0;

			function log(tag, msg) {
				const elapsed = ((Date.now() - logT0) / 1000).toFixed(1);
				const entry = document.createElement('div');
				entry.className = 'log-entry';
				entry.innerHTML =
					`<span class="log-time">${elapsed}s</span>` +
					`<span class="log-tag tag-${tag}">[${tag.toUpperCase()}]</span>` +
					`<span class="log-msg">${msg}</span>`;
				logEl.appendChild(entry);
				logEl.scrollTop = logEl.scrollHeight;
				if (tag === 'pass') passCount++;
				if (tag === 'fail') failCount++;
			}

			function assert(condition, msg) {
				if (condition) {
					log('pass', msg);
				} else {
					log('fail', 'FAIL: ' + msg);
				}
			}

			// ── Setup player ────────────────────────────────────────────────────
			const canvas = document.getElementById('gameCanvas');
			const app = createPlayer({
				canvas,
				contentWidth: 800,
				contentHeight: 600,
				scaleMode: 'showAll',
				frameRate: 60,
			});
			log('info', `Player created, WebGL: ${app.player.isWebGL}`);

			const root = new Sprite();
			app.start(root);
			log('info', 'Player started');

			// ── Helper: draw a label above each test ────────────────────────────
			let testY = 10;
			const COL_W = 390;
			const COLS = 2;
			let testCol = 0;
			let colBaseY = [10, 10];

			function nextPosition(h) {
				const y = colBaseY[testCol];
				const x = testCol * (COL_W + 10) + 10;
				colBaseY[testCol] += h + 8;
				if (colBaseY[testCol] > colBaseY[(testCol + 1) % COLS]) {
					// next goes to shorter column
				}
				return { x, y };
			}

			function nextColumn() {
				testCol = (testCol + 1) % COLS;
			}

			function addLabel(text, x, y) {
				const label = new TextField();
				label.text = text;
				label.textColor = 0x8888a0;
				label.size = 11;
				label.width = 380;
				label.height = 16;
				label.x = x;
				label.y = y;
				root.addChild(label);
			}

			// ── Test 1: Basic single-line text ──────────────────────────────────
			{
				const pos = nextPosition(50);
				addLabel('1. Basic single-line', pos.x, pos.y);
				const tf = new TextField();
				tf.text = 'Hello, Heron!';
				tf.textColor = 0xffffff;
				tf.size = 28;
				tf.width = 380;
				tf.height = 40;
				tf.x = pos.x;
				tf.y = pos.y + 16;
				root.addChild(tf);
				assert(tf.text === 'Hello, Heron!', '1. Basic text set/get');
				assert(tf.textWidth > 0, '1. textWidth > 0 (' + tf.textWidth.toFixed(1) + ')');
			}
			nextColumn();

			// ── Test 2: Multi-color rich text (textFlow) ────────────────────────
			{
				const pos = nextPosition(50);
				addLabel('2. Rich text (textFlow)', pos.x, pos.y);
				const tf = new TextField();
				tf.textFlow = [
					{ text: 'Red ', style: { textColor: 0xff4444, size: 24, bold: true } },
					{ text: 'Green ', style: { textColor: 0x44ff44, size: 24 } },
					{ text: 'Blue', style: { textColor: 0x4488ff, size: 24, italic: true } },
				];
				tf.width = 380;
				tf.height = 40;
				tf.x = pos.x;
				tf.y = pos.y + 16;
				root.addChild(tf);
				assert(tf.text === 'Red Green Blue', '2. textFlow concatenated text');
				assert(tf.numLines === 1, '2. Single line');
			}
			nextColumn();

			// ── Test 3: Word wrap ───────────────────────────────────────────────
			{
				const pos = nextPosition(80);
				addLabel('3. Word wrap', pos.x, pos.y);
				const tf = new TextField();
				tf.text =
					'The quick brown fox jumps over the lazy dog. This is a longer sentence to test word wrapping behavior.';
				tf.textColor = 0xccccdd;
				tf.size = 16;
				tf.width = 380;
				tf.height = 70;
				tf.wordWrap = true;
				tf.x = pos.x;
				tf.y = pos.y + 16;
				root.addChild(tf);
				assert(tf.numLines > 1, '3. Word wrap: ' + tf.numLines + ' lines');
			}
			nextColumn();

			// ── Test 4: textAlign (left / center / right) ───────────────────────
			{
				const pos = nextPosition(90);
				addLabel('4. textAlign (L / C / R)', pos.x, pos.y);
				const labels = ['Left', 'Center', 'Right'];
				const aligns = [HorizontalAlign.LEFT, HorizontalAlign.CENTER, HorizontalAlign.RIGHT];
				for (let i = 0; i < 3; i++) {
					const tf = new TextField();
					tf.text = labels[i] + ' aligned text';
					tf.textColor = 0x88ccff;
					tf.size = 14;
					tf.textAlign = aligns[i];
					tf.width = 380;
					tf.height = 20;
					tf.x = pos.x;
					tf.y = pos.y + 18 + i * 22;
					root.addChild(tf);
					assert(tf.textAlign === aligns[i], '4. textAlign = ' + aligns[i]);
				}
			}
			nextColumn();

			// ── Test 5: verticalAlign (top / middle / bottom) ───────────────────
			{
				const pos = nextPosition(90);
				addLabel('5. verticalAlign (T / M / B)', pos.x, pos.y);
				const vals = [
					{ label: 'Top', align: VerticalAlign.TOP },
					{ label: 'Middle', align: VerticalAlign.MIDDLE },
					{ label: 'Bottom', align: VerticalAlign.BOTTOM },
				];
				for (let i = 0; i < 3; i++) {
					const tf = new TextField();
					tf.text = vals[i].label;
					tf.textColor = 0xffcc44;
					tf.size = 14;
					tf.verticalAlign = vals[i].align;
					tf.width = 120;
					tf.height = 24;
					tf.border = true;
					tf.borderColor = 0x444455;
					tf.x = pos.x + i * 130;
					tf.y = pos.y + 18;
					root.addChild(tf);
					assert(tf.verticalAlign === vals[i].align, '5. verticalAlign = ' + vals[i].align);
				}
			}
			nextColumn();

			// ── Test 6: Bold + Italic ────────────────────────────────────────────
			{
				const pos = nextPosition(50);
				addLabel('6. Bold + Italic', pos.x, pos.y);
				const tf1 = new TextField();
				tf1.text = 'Bold text';
				tf1.textColor = 0xffffff;
				tf1.size = 20;
				tf1.bold = true;
				tf1.width = 180;
				tf1.height = 28;
				tf1.x = pos.x;
				tf1.y = pos.y + 16;
				root.addChild(tf1);
				assert(tf1.bold === true, '6. bold = true');

				const tf2 = new TextField();
				tf2.text = 'Italic text';
				tf2.textColor = 0xffffff;
				tf2.size = 20;
				tf2.italic = true;
				tf2.width = 180;
				tf2.height = 28;
				tf2.x = pos.x + 190;
				tf2.y = pos.y + 16;
				root.addChild(tf2);
				assert(tf2.italic === true, '6. italic = true');
			}
			nextColumn();

			// ── Test 7: Stroke (text outline) ────────────────────────────────────
			{
				const pos = nextPosition(50);
				addLabel('7. Stroke', pos.x, pos.y);
				const tf = new TextField();
				tf.text = 'Stroked Text';
				tf.textColor = 0xffff00;
				tf.strokeColor = 0x000000;
				tf.stroke = 2;
				tf.size = 26;
				tf.width = 380;
				tf.height = 40;
				tf.x = pos.x;
				tf.y = pos.y + 16;
				root.addChild(tf);
				assert(tf.stroke === 2, '7. stroke = 2');
			}
			nextColumn();

			// ── Test 8: Font family ─────────────────────────────────────────────
			{
				const pos = nextPosition(70);
				addLabel('8. Font family', pos.x, pos.y);
				const fonts = ['Georgia', 'Courier New', 'Verdana'];
				for (let i = 0; i < fonts.length; i++) {
					const tf = new TextField();
					tf.text = fonts[i];
					tf.textColor = 0xddddff;
					tf.size = 16;
					tf.fontFamily = fonts[i];
					tf.width = 380;
					tf.height = 20;
					tf.x = pos.x;
					tf.y = pos.y + 16 + i * 20;
					root.addChild(tf);
					assert(tf.fontFamily === fonts[i], '8. fontFamily = ' + fonts[i]);
				}
			}
			nextColumn();

			// ── Test 9: Background + Border ─────────────────────────────────────
			{
				const pos = nextPosition(50);
				addLabel('9. Background + Border', pos.x, pos.y);
				const tf = new TextField();
				tf.text = '  Background + Border  ';
				tf.textColor = 0x000000;
				tf.size = 20;
				tf.background = true;
				tf.backgroundColor = 0xeeeeee;
				tf.border = true;
				tf.borderColor = 0xff4444;
				tf.width = 380;
				tf.height = 36;
				tf.x = pos.x;
				tf.y = pos.y + 16;
				root.addChild(tf);
				assert(tf.background === true, '9. background = true');
				assert(tf.border === true, '9. border = true');
			}
			nextColumn();

			// ── Test 10: displayAsPassword ──────────────────────────────────────
			{
				const pos = nextPosition(50);
				addLabel('10. displayAsPassword', pos.x, pos.y);
				const tf = new TextField();
				tf.text = 'secret123';
				tf.textColor = 0xffffff;
				tf.size = 22;
				tf.displayAsPassword = true;
				tf.width = 380;
				tf.height = 34;
				tf.x = pos.x;
				tf.y = pos.y + 16;
				root.addChild(tf);
				assert(tf.text === 'secret123', '10. text returns raw value');
				// Internally displays as '*********'
				assert(tf.getLinesArr()[0].elements[0].text === '*********', '10. Displays as asterisks');
			}
			nextColumn();

			// ── Test 11: lineSpacing ────────────────────────────────────────────
			{
				const pos = nextPosition(80);
				addLabel('11. lineSpacing (8px gap)', pos.x, pos.y);
				const tf = new TextField();
				tf.text = 'Line 1\nLine 2\nLine 3';
				tf.textColor = 0xaaddaa;
				tf.size = 14;
				tf.lineSpacing = 8;
				tf.width = 380;
				tf.height = 70;
				tf.x = pos.x;
				tf.y = pos.y + 16;
				root.addChild(tf);
				assert(tf.lineSpacing === 8, '11. lineSpacing = 8');
				assert(tf.numLines === 3, '11. 3 lines (\\n breaks)');
			}
			nextColumn();

			// ── Test 12: Multiline with word wrap ───────────────────────────────
			{
				const pos = nextPosition(80);
				addLabel('12. Multiline + wordWrap', pos.x, pos.y);
				const tf = new TextField();
				tf.text =
					'This is a multiline text field with word wrapping enabled. It should automatically break lines at the boundary.';
				tf.textColor = 0xddbb88;
				tf.size = 14;
				tf.multiline = true;
				tf.wordWrap = true;
				tf.width = 380;
				tf.height = 70;
				tf.x = pos.x;
				tf.y = pos.y + 16;
				root.addChild(tf);
				assert(tf.multiline === true, '12. multiline = true');
				assert(tf.wordWrap === true, '12. wordWrap = true');
				assert(tf.numLines >= 3, '12. >= 3 lines (' + tf.numLines + ')');
			}
			nextColumn();

			// ── Test 13: appendText ─────────────────────────────────────────────
			{
				const pos = nextPosition(50);
				addLabel('13. appendText', pos.x, pos.y);
				const tf = new TextField();
				tf.text = 'Hello';
				tf.appendText(' World');
				tf.textColor = 0xffffff;
				tf.size = 22;
				tf.width = 380;
				tf.height = 34;
				tf.x = pos.x;
				tf.y = pos.y + 16;
				root.addChild(tf);
				assert(tf.text === 'Hello World', '13. appendText works');
			}
			nextColumn();

			// ── Test 14: appendElement (rich) ───────────────────────────────────
			{
				const pos = nextPosition(50);
				addLabel('14. appendElement (rich)', pos.x, pos.y);
				const tf = new TextField();
				tf.textFlow = [{ text: 'Normal ', style: { textColor: 0xffffff, size: 18 } }];
				tf.appendElement({ text: 'Bold', style: { textColor: 0xffaa00, size: 18, bold: true } });
				tf.width = 380;
				tf.height = 34;
				tf.x = pos.x;
				tf.y = pos.y + 16;
				root.addChild(tf);
				assert(tf.text === 'Normal Bold', '14. appendElement text');
				assert(tf.textFlow.length === 2, '14. textFlow has 2 elements');
			}
			nextColumn();

			// ── Test 15: Empty text ─────────────────────────────────────────────
			{
				const pos = nextPosition(40);
				addLabel('15. Empty text', pos.x, pos.y);
				const tf = new TextField();
				tf.text = '';
				tf.border = true;
				tf.borderColor = 0x666666;
				tf.width = 380;
				tf.height = 24;
				tf.x = pos.x;
				tf.y = pos.y + 16;
				root.addChild(tf);
				assert(tf.text === '', '15. Empty string');
				assert(tf.textWidth === 0, '15. textWidth = 0');
			}
			nextColumn();

			// ── Test 16: Unicode / CJK text ────────────────────────────────────
			{
				const pos = nextPosition(50);
				addLabel('16. Unicode / CJK', pos.x, pos.y);
				const tf = new TextField();
				tf.text = '你好世界 🎮 こんにちは';
				tf.textColor = 0xff88cc;
				tf.size = 20;
				tf.width = 380;
				tf.height = 34;
				tf.x = pos.x;
				tf.y = pos.y + 16;
				root.addChild(tf);
				assert(tf.text === '你好世界 🎮 こんにちは', '16. CJK + emoji preserved');
			}
			nextColumn();

			// ── Test 17: Size variation in textFlow ─────────────────────────────
			{
				const pos = nextPosition(50);
				addLabel('17. Mixed sizes (textFlow)', pos.x, pos.y);
				const tf = new TextField();
				tf.textFlow = [
					{ text: 'Small ', style: { textColor: 0xffffff, size: 12 } },
					{ text: 'Medium ', style: { textColor: 0xaaccff, size: 20 } },
					{ text: 'Large', style: { textColor: 0xffcc88, size: 30 } },
				];
				tf.width = 380;
				tf.height = 40;
				tf.x = pos.x;
				tf.y = pos.y + 16;
				root.addChild(tf);
				assert(tf.textFlow.length === 3, '17. 3 elements with different sizes');
			}
			nextColumn();

			// ── Test 18: Input mode ─────────────────────────────────────────────
			{
				const pos = nextPosition(50);
				addLabel('18. Input mode (click to type)', pos.x, pos.y);
				const tf = new TextField();
				tf.type = TextFieldType.INPUT;
				tf.text = 'Click to edit';
				tf.textColor = 0xffffff;
				tf.size = 16;
				tf.width = 380;
				tf.height = 30;
				tf.border = true;
				tf.borderColor = 0x6c9cff;
				tf.background = true;
				tf.backgroundColor = 0x1a1a2e;
				tf.x = pos.x;
				tf.y = pos.y + 16;
				root.addChild(tf);
				assert(tf.type === TextFieldType.INPUT, '18. type = INPUT');
				assert(tf.touchEnabled === true, '18. touchEnabled = true');
			}
			nextColumn();

			// ── Test 19: getLineHeight ──────────────────────────────────────────
			{
				const pos = nextPosition(40);
				addLabel('19. getLineHeight()', pos.x, pos.y);
				const tf = new TextField();
				tf.size = 24;
				tf.lineSpacing = 6;
				tf.text = 'Line height test';
				tf.textColor = 0xaaaaaa;
				tf.width = 380;
				tf.height = 24;
				tf.x = pos.x;
				tf.y = pos.y + 16;
				root.addChild(tf);
				assert(tf.getLineHeight() === 30, '19. getLineHeight() = 30 (24+6)');
			}
			nextColumn();

			// ── Test 20: numLines with explicit newlines ────────────────────────
			{
				const pos = nextPosition(40);
				addLabel('20. numLines', pos.x, pos.y);
				const tf = new TextField();
				tf.text = 'A\nB\nC\nD';
				tf.textColor = 0x88ffaa;
				tf.size = 14;
				tf.width = 380;
				tf.height = 24;
				tf.x = pos.x;
				tf.y = pos.y + 16;
				root.addChild(tf);
				assert(tf.numLines === 4, '20. numLines = 4 (A\\nB\\nC\\nD)');
			}
			nextColumn();

			// ── Summary ─────────────────────────────────────────────────────────
			log('info', '────────────────────────────────');
			log('info', `Renderer: ${app.player.isWebGL ? 'WebGL' : 'Canvas 2D'}`);
			log('info', `Total: ${passCount + failCount} tests, ${passCount} passed, ${failCount} failed`);
			log('info', '────────────────────────────────');

			// ── FPS counter ─────────────────────────────────────────────────────
			const fpsEl = document.getElementById('fps-display');
			let fpsFrames = 0,
				fpsLast = performance.now();
			(function fpsLoop() {
				fpsFrames++;
				const now = performance.now();
				if (now - fpsLast >= 500) {
					const fps = Math.round((fpsFrames / (now - fpsLast)) * 1000);
					fpsEl.textContent = fps + ' FPS';
					fpsEl.className = 'fps-badge' + (fps > 50 ? '' : fps > 30 ? ' warn' : ' bad');
					fpsFrames = 0;
					fpsLast = now;
				}
				requestAnimationFrame(fpsLoop);
			})();
		</script>
	</body>
</html>
