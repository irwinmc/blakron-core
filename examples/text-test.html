<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Text Test</title>
		<link rel="stylesheet" href="style.css" />
		<style>
			:root {
				--sidebar-w: 220px;
				--log-h: 260px;
			}
			.sidebar {
				padding: 10px;
				gap: 4px;
			}
			.sidebar-label {
				font-size: 9px;
				font-weight: 600;
				color: var(--text-dim);
				text-transform: uppercase;
				letter-spacing: 0.1em;
				padding: 6px 8px 4px;
			}
			.test-btn {
				display: block;
				width: 100%;
				text-align: left;
				padding: 7px 10px;
				border: 1px solid transparent;
				border-radius: 6px;
				background: transparent;
				color: var(--text-muted);
				font-family: inherit;
				font-size: 11px;
				cursor: pointer;
				transition: all 0.15s;
				line-height: 1.4;
			}
			.test-btn:hover {
				color: var(--text);
				background: var(--glass);
				border-color: var(--glass-border);
			}
			.test-btn.active {
				color: var(--accent);
				background: rgba(108, 156, 255, 0.08);
				border-color: rgba(108, 156, 255, 0.2);
				font-weight: 600;
			}
			.test-btn .num {
				display: inline-block;
				width: 18px;
				color: var(--text-dim);
				font-variant-numeric: tabular-nums;
			}
			canvas {
				box-sizing: content-box;
			}
			.log-tag {
				width: 52px;
			}
			.log-time {
				width: 50px;
			}
			.tag-pass {
				color: #4ade80;
			}
			.tag-fail {
				color: #f87171;
			}
			.summary {
				padding: 8px 10px;
				border-top: 1px solid var(--glass-border);
				font-size: 11px;
				color: var(--text-dim);
				display: flex;
				justify-content: space-between;
			}
			.summary .good {
				color: var(--success);
			}
			.summary .bad {
				color: var(--error);
			}
		</style>
	</head>
	<body>
		<div class="header">
			<a href="index.html" class="back-link">&larr; Back</a>
			<span class="page-title">TextField Test</span>
			<div class="header-right">
				<div id="fps-display" class="fps-badge">-- FPS</div>
			</div>
		</div>
		<div class="main">
			<div class="sidebar">
				<div class="sidebar-label">Test Scenes</div>
				<!-- buttons injected by JS -->
			</div>
			<div class="right-panel">
				<div id="canvas-wrap">
					<canvas id="gameCanvas" width="640" height="480"></canvas>
				</div>
				<div class="log-panel">
					<div class="log-header"><span>Test Results</span></div>
					<div id="log"></div>
					<div class="summary">
						<span id="summary-text">Click a test to begin</span>
					</div>
				</div>
			</div>
		</div>

		<script type="module">
			import {
				createPlayer,
				Sprite,
				TextField,
				HorizontalAlign,
				VerticalAlign,
				TextFieldType,
			} from '../src/index.js';

			// ── Logging ─────────────────────────────────────────────────────────
			const logEl = document.getElementById('log');
			const logT0 = Date.now();
			let passCount = 0;
			let failCount = 0;

			function log(tag, msg) {
				const elapsed = ((Date.now() - logT0) / 1000).toFixed(1);
				const entry = document.createElement('div');
				entry.className = 'log-entry';
				entry.innerHTML =
					`<span class="log-time">${elapsed}s</span>` +
					`<span class="log-tag tag-${tag}">[${tag.toUpperCase()}]</span>` +
					`<span class="log-msg">${msg}</span>`;
				logEl.appendChild(entry);
				logEl.scrollTop = logEl.scrollHeight;
				if (tag === 'pass') passCount++;
				if (tag === 'fail') failCount++;
			}

			function assert(condition, msg) {
				if (condition) {
					log('pass', msg);
				} else {
					log('fail', 'FAIL: ' + msg);
				}
			}

			function clearLog() {
				logEl.innerHTML = '';
				passCount = 0;
				failCount = 0;
			}

			function updateSummary() {
				const el = document.getElementById('summary-text');
				const total = passCount + failCount;
				if (total === 0) {
					el.innerHTML = 'No assertions yet';
					return;
				}
				el.innerHTML =
					`<span class="${failCount === 0 ? 'good' : 'bad'}">${passCount}/${total} passed</span>` +
					(failCount > 0 ? ` · <span class="bad">${failCount} failed</span>` : '');
			}

			// ── Setup player ────────────────────────────────────────────────────
			const canvas = document.getElementById('gameCanvas');
			const app = createPlayer({
				canvas,
				contentWidth: 640,
				contentHeight: 480,
				scaleMode: 'noScale',
				frameRate: 60,
			});

			const root = new Sprite();
			app.start(root);

			/** Clear all children from root */
			function clearScene() {
				while (root.numChildren > 0) {
					root.removeChildAt(0);
				}
			}

			// ── Test definitions ────────────────────────────────────────────────
			const tests = [];

			function define(name, fn) {
				tests.push({ name, fn });
			}

			// --- 1. Basic single-line ---
			define('Basic single-line', () => {
				const tf = new TextField();
				tf.text = 'Hello, Blakron!';
				tf.textColor = 0xffffff;
				tf.size = 28;
				tf.width = 600;
				tf.height = 40;
				tf.x = 20;
				tf.y = 20;
				root.addChild(tf);
				assert(tf.text === 'Hello, Blakron!', 'text set/get');
				assert(tf.textWidth > 0, 'textWidth > 0 (' + tf.textWidth.toFixed(1) + ')');
			});

			// --- 2. Rich text (textFlow) ---
			define('Rich text (textFlow)', () => {
				const tf = new TextField();
				tf.textFlow = [
					{ text: 'Red ', style: { textColor: 0xff4444, size: 24, bold: true } },
					{ text: 'Green ', style: { textColor: 0x44ff44, size: 24 } },
					{ text: 'Blue', style: { textColor: 0x4488ff, size: 24, italic: true } },
				];
				tf.width = 600;
				tf.height = 40;
				tf.x = 20;
				tf.y = 20;
				root.addChild(tf);
				assert(tf.text === 'Red Green Blue', 'textFlow concatenated');
				assert(tf.numLines === 1, 'Single line');
			});

			// --- 3. Word wrap ---
			define('Word wrap', () => {
				const tf = new TextField();
				tf.text =
					'The quick brown fox jumps over the lazy dog. This is a longer sentence to test word wrapping behavior.';
				tf.textColor = 0xccccdd;
				tf.size = 16;
				tf.width = 600;
				tf.height = 80;
				tf.wordWrap = true;
				tf.x = 20;
				tf.y = 20;
				root.addChild(tf);
				assert(tf.numLines > 1, tf.numLines + ' lines (>1)');
			});

			// --- 4. textAlign ---
			define('textAlign (L / C / R)', () => {
				const aligns = [HorizontalAlign.LEFT, HorizontalAlign.CENTER, HorizontalAlign.RIGHT];
				const labels = ['Left', 'Center', 'Right'];
				for (let i = 0; i < 3; i++) {
					const tf = new TextField();
					tf.text = labels[i] + ' aligned text';
					tf.textColor = 0x88ccff;
					tf.size = 16;
					tf.textAlign = aligns[i];
					tf.width = 600;
					tf.height = 30;
					tf.border = true;
					tf.borderColor = 0x334466;
					tf.x = 20;
					tf.y = 20 + i * 38;
					root.addChild(tf);
					assert(tf.textAlign === aligns[i], 'textAlign = ' + aligns[i]);
				}
			});

			// --- 5. verticalAlign ---
			define('verticalAlign (T / M / B)', () => {
				const vals = [
					{ label: 'Top', align: VerticalAlign.TOP },
					{ label: 'Middle', align: VerticalAlign.MIDDLE },
					{ label: 'Bottom', align: VerticalAlign.BOTTOM },
				];
				for (let i = 0; i < 3; i++) {
					const tf = new TextField();
					tf.text = vals[i].label;
					tf.textColor = 0xffcc44;
					tf.size = 16;
					tf.verticalAlign = vals[i].align;
					tf.width = 600;
					tf.height = 60;
					tf.border = true;
					tf.borderColor = 0x444455;
					tf.x = 20;
					tf.y = 20 + i * 68;
					root.addChild(tf);
					assert(tf.verticalAlign === vals[i].align, 'verticalAlign = ' + vals[i].align);
				}
			});

			// --- 6. Bold + Italic ---
			define('Bold + Italic', () => {
				const tf1 = new TextField();
				tf1.text = 'Bold text';
				tf1.textColor = 0xffffff;
				tf1.size = 22;
				tf1.bold = true;
				tf1.width = 280;
				tf1.height = 32;
				tf1.x = 20;
				tf1.y = 20;
				root.addChild(tf1);
				assert(tf1.bold === true, 'bold = true');

				const tf2 = new TextField();
				tf2.text = 'Italic text';
				tf2.textColor = 0xffffff;
				tf2.size = 22;
				tf2.italic = true;
				tf2.width = 280;
				tf2.height = 32;
				tf2.x = 320;
				tf2.y = 20;
				root.addChild(tf2);
				assert(tf2.italic === true, 'italic = true');
			});

			// --- 7. Stroke ---
			define('Stroke', () => {
				const tf = new TextField();
				tf.text = 'Stroked Text';
				tf.textColor = 0x000000;
				tf.strokeColor = 0xffffff;
				tf.stroke = 3;
				tf.size = 30;
				tf.width = 600;
				tf.height = 44;
				tf.x = 20;
				tf.y = 20;
				root.addChild(tf);
				assert(tf.stroke === 3, 'stroke = 3');
			});

			// --- 8. Font family ---
			define('Font family', () => {
				const fonts = ['Georgia', 'Courier New', 'Verdana'];
				for (let i = 0; i < fonts.length; i++) {
					const tf = new TextField();
					tf.text = fonts[i] + ' — The quick brown fox';
					tf.textColor = 0xddddff;
					tf.size = 16;
					tf.fontFamily = fonts[i];
					tf.width = 600;
					tf.height = 24;
					tf.x = 20;
					tf.y = 20 + i * 28;
					root.addChild(tf);
					assert(tf.fontFamily === fonts[i], 'fontFamily = ' + fonts[i]);
				}
			});

			// --- 9. Background + Border ---
			define('Background + Border', () => {
				const tf = new TextField();
				tf.text = '  Background + Border  ';
				tf.textColor = 0x000000;
				tf.size = 22;
				tf.background = true;
				tf.backgroundColor = 0xeeeeee;
				tf.border = true;
				tf.borderColor = 0xff4444;
				tf.width = 600;
				tf.height = 40;
				tf.x = 20;
				tf.y = 20;
				root.addChild(tf);
				assert(tf.background === true, 'background = true');
				assert(tf.border === true, 'border = true');
			});

			// --- 10. displayAsPassword ---
			define('displayAsPassword', () => {
				const tf = new TextField();
				tf.text = 'secret123';
				tf.textColor = 0xffffff;
				tf.size = 24;
				tf.displayAsPassword = true;
				tf.width = 600;
				tf.height = 36;
				tf.x = 20;
				tf.y = 20;
				root.addChild(tf);
				assert(tf.text === 'secret123', 'text returns raw value');
				const displayText = tf.getLinesArr()[0].elements[0].text;
				assert(displayText === '*********', 'Displays as asterisks ("' + displayText + '")');
			});

			// --- 11. lineSpacing ---
			define('lineSpacing', () => {
				const tf = new TextField();
				tf.text = 'Line 1\nLine 2\nLine 3';
				tf.textColor = 0xaaddaa;
				tf.size = 16;
				tf.lineSpacing = 10;
				tf.width = 600;
				tf.height = 100;
				tf.x = 20;
				tf.y = 20;
				root.addChild(tf);
				assert(tf.lineSpacing === 10, 'lineSpacing = 10');
				assert(tf.numLines === 3, '3 lines (got ' + tf.numLines + ')');
			});

			// --- 12. Multiline + wordWrap ---
			define('Multiline + wordWrap', () => {
				const tf = new TextField();
				tf.text =
					'This is a multiline text field with word wrapping enabled. It should automatically break lines at the boundary.';
				tf.textColor = 0xddbb88;
				tf.size = 16;
				tf.multiline = true;
				tf.wordWrap = true;
				tf.width = 600;
				tf.height = 80;
				tf.x = 20;
				tf.y = 20;
				root.addChild(tf);
				assert(tf.multiline === true, 'multiline = true');
				assert(tf.wordWrap === true, 'wordWrap = true');
				assert(tf.numLines >= 2, '>= 2 lines (' + tf.numLines + ')');
			});

			// --- 13. appendText ---
			define('appendText', () => {
				const tf = new TextField();
				tf.text = 'Hello';
				tf.appendText(' World');
				tf.textColor = 0xffffff;
				tf.size = 26;
				tf.width = 600;
				tf.height = 40;
				tf.x = 20;
				tf.y = 20;
				root.addChild(tf);
				assert(tf.text === 'Hello World', 'appendText (got: "' + tf.text + '")');
			});

			// --- 14. appendElement ---
			define('appendElement (rich)', () => {
				const tf = new TextField();
				tf.textFlow = [{ text: 'Normal ', style: { textColor: 0xffffff, size: 20 } }];
				tf.appendElement({ text: 'Bold', style: { textColor: 0xffaa00, size: 20, bold: true } });
				tf.width = 600;
				tf.height = 36;
				tf.x = 20;
				tf.y = 20;
				root.addChild(tf);
				assert(tf.text === 'Normal Bold', 'text = "Normal Bold" (got: "' + tf.text + '")');
				assert(
					tf.textFlow && tf.textFlow.length === 2,
					'textFlow.length = 2 (got: ' + (tf.textFlow?.length ?? 0) + ')',
				);
			});

			// --- 15. Empty text ---
			define('Empty text', () => {
				const tf = new TextField();
				tf.text = '';
				tf.border = true;
				tf.borderColor = 0x666666;
				tf.width = 600;
				tf.height = 30;
				tf.x = 20;
				tf.y = 20;
				root.addChild(tf);
				assert(tf.text === '', 'Empty string');
				assert(tf.textWidth === 0, 'textWidth = 0');
			});

			// --- 16. Unicode / CJK ---
			define('Unicode / CJK', () => {
				const tf = new TextField();
				tf.text = '你好世界 🎮 こんにちは';
				tf.textColor = 0xff88cc;
				tf.size = 24;
				tf.width = 600;
				tf.height = 40;
				tf.x = 20;
				tf.y = 20;
				root.addChild(tf);
				assert(tf.text === '你好世界 🎮 こんにちは', 'CJK + emoji preserved');
			});

			// --- 17. Mixed sizes (textFlow) ---
			define('Mixed sizes (textFlow)', () => {
				const tf = new TextField();
				tf.textFlow = [
					{ text: 'Small ', style: { textColor: 0xffffff, size: 12 } },
					{ text: 'Medium ', style: { textColor: 0xaaccff, size: 22 } },
					{ text: 'Large', style: { textColor: 0xffcc88, size: 34 } },
				];
				tf.width = 600;
				tf.height = 50;
				tf.x = 20;
				tf.y = 20;
				root.addChild(tf);
				assert(tf.textFlow && tf.textFlow.length === 3, '3 elements');
			});

			// --- 18. Input mode ---
			define('Input mode (click)', () => {
				const tf = new TextField();
				tf.text = 'Click to edit';
				tf.textColor = 0xffffff;
				tf.size = 18;
				tf.width = 600;
				tf.height = 34;
				tf.border = true;
				tf.borderColor = 0x6c9cff;
				tf.background = true;
				tf.backgroundColor = 0x1a1a2e;
				tf.type = TextFieldType.INPUT;
				tf.x = 20;
				tf.y = 20;
				root.addChild(tf);
				assert(tf.type === TextFieldType.INPUT, 'type = INPUT');
				assert(tf.touchEnabled === true, 'touchEnabled = true');
			});

			// --- 19. getLineHeight ---
			define('getLineHeight()', () => {
				const tf = new TextField();
				tf.size = 24;
				tf.lineSpacing = 6;
				tf.text = 'Line height test';
				tf.textColor = 0xaaaaaa;
				tf.size = 16;
				tf.width = 600;
				tf.height = 30;
				tf.x = 20;
				tf.y = 20;
				root.addChild(tf);
				assert(tf.getLineHeight() === 22, 'getLineHeight() = 22 (16+6)');
			});

			// --- 20. numLines ---
			define('numLines', () => {
				const tf = new TextField();
				tf.text = 'A\nB\nC\nD';
				tf.textColor = 0x88ffaa;
				tf.size = 16;
				tf.width = 600;
				tf.height = 30;
				tf.x = 20;
				tf.y = 20;
				root.addChild(tf);
				assert(tf.numLines === 4, 'numLines = 4 (got ' + tf.numLines + ')');
			});

			// ── Build sidebar buttons ───────────────────────────────────────────
			const sidebar = document.querySelector('.sidebar');
			let activeBtn = null;

			tests.forEach((test, i) => {
				const btn = document.createElement('button');
				btn.className = 'test-btn';
				btn.innerHTML = `<span class="num">${i + 1}.</span> ${test.name}`;
				btn.addEventListener('click', () => {
					// Update active state
					if (activeBtn) activeBtn.classList.remove('active');
					btn.classList.add('active');
					activeBtn = btn;
					// Run test
					clearScene();
					clearLog();
					log('info', `Test ${i + 1}: ${test.name}`);
					test.fn();
					updateSummary();
				});
				sidebar.appendChild(btn);
			});

			// Add "Run All" button
			const sep = document.createElement('div');
			sep.className = 'sidebar-label';
			sep.style.marginTop = '8px';
			sep.textContent = 'Batch';
			sidebar.appendChild(sep);

			const runAllBtn = document.createElement('button');
			runAllBtn.className = 'test-btn';
			runAllBtn.innerHTML = '▶ Run All Tests';
			runAllBtn.style.color = 'var(--accent)';
			runAllBtn.addEventListener('click', () => {
				if (activeBtn) activeBtn.classList.remove('active');
				activeBtn = null;
				clearScene();
				clearLog();
				log('info', `Running all ${tests.length} tests…`);
				for (let i = 0; i < tests.length; i++) {
					log('info', `── Test ${i + 1}: ${tests[i].name} ──`);
					tests[i].fn();
				}
				log('info', '──────────────────────────');
				log('info', `Renderer: ${app.player.isWebGL ? 'WebGL' : 'Canvas 2D'}`);
				log('info', `Total: ${passCount + failCount} assertions, ${passCount} passed, ${failCount} failed`);
				updateSummary();

				// Show a summary TextField on canvas
				const summary = new TextField();
				summary.text = `${passCount}/${passCount + failCount} passed`;
				summary.textColor = failCount === 0 ? 0x4ade80 : 0xf87171;
				summary.size = 28;
				summary.bold = true;
				summary.width = 600;
				summary.height = 40;
				summary.textAlign = HorizontalAlign.CENTER;
				summary.x = 20;
				summary.y = 220;
				root.addChild(summary);
			});
			sidebar.appendChild(runAllBtn);

			// ── Auto-run first test ─────────────────────────────────────────────
			if (tests.length > 0) {
				const firstBtn = sidebar.querySelector('.test-btn');
				if (firstBtn) firstBtn.click();
			}

			// ── FPS counter ─────────────────────────────────────────────────────
			const fpsEl = document.getElementById('fps-display');
			let fpsFrames = 0,
				fpsLast = performance.now();
			(function fpsLoop() {
				fpsFrames++;
				const now = performance.now();
				if (now - fpsLast >= 500) {
					const fps = Math.round((fpsFrames / (now - fpsLast)) * 1000);
					fpsEl.textContent = fps + ' FPS';
					fpsEl.className = 'fps-badge' + (fps > 50 ? '' : fps > 30 ? ' warn' : ' bad');
					fpsFrames = 0;
					fpsLast = now;
				}
				requestAnimationFrame(fpsLoop);
			})();
		</script>
	</body>
</html>
