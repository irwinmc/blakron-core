<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Heron Minimal Test</title>
		<style>
			body {
				margin: 20px;
				background: #111;
			}
		</style>
	</head>
	<body>
		<canvas id="c" width="400" height="300" style="border: 1px solid #444"></canvas>
		<div id="log" style="color: #0f0; font: 12px monospace; padding: 8px; white-space: pre"></div>
		<script type="module">
			window.__HERON_DEBUG_VERTS = true;

			import { Player, Shape, Sprite } from '../src/index.js';

			const log = document.getElementById('log');
			const L = m => {
				log.innerHTML += m + '\n';
				console.log(m);
			};

			const canvas = document.getElementById('c');
			const player = new Player(canvas);
			L('WebGL: ' + player.isWebGL);

			const root = new Sprite();
			player.updateStageSize(400, 300);
			player.start(root);

			// Two rects only
			const a = new Shape();
			a.graphics.beginFill(0xff0000, 1);
			a.graphics.drawRect(0, 0, 80, 60);
			a.graphics.endFill();
			a.x = 20;
			a.y = 20;
			root.addChild(a);
			L('A: red 80x60 at (20,20)');

			const b = new Shape();
			b.graphics.beginFill(0x00ff00, 1);
			b.graphics.drawRect(0, 0, 80, 60);
			b.graphics.endFill();
			b.x = 150;
			b.y = 20;
			root.addChild(b);
			L('B: green 80x60 at (150,20)');

			L('Expected: red at left, green at right, both rectangles, no overlap');
			L('Check console for vertex data');

			setTimeout(() => {
				window.__HERON_DEBUG_VERTS = false;
			}, 300);
		</script>
	</body>
</html>
